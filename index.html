<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>咒术转盘 · JJK Roulette</title>
<style>
:root {
  --bg: #0a0a0c;
  --bg2: #141418;
  --red: #d4213d;
  --red-glow: #ff3366;
  --purple: #6b21a8;
  --gold: #c9a84c;
  --text: #e0d8d0;
  --dim: #6b6560;
  --radius: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* 背景咒纹 */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background: radial-gradient(ellipse at 50% 0%, rgba(212,33,61,.08) 0%, transparent 60%),
              repeating-linear-gradient(45deg, rgba(255,255,255,.004) 0px, rgba(255,255,255,.004) 2px, transparent 2px, transparent 8px);
  pointer-events: none;
  z-index: 0;
}

.app { position:relative; z-index:1; max-width:700px; margin:0 auto; padding:16px; display:flex; flex-direction:column; align-items:center; gap:14px; min-height:100vh; }

/* 标题 */
.header { text-align:center; padding-top: 10px; }
.header h1 { font-size:clamp(22px,5vw,34px); font-weight:900; letter-spacing:3px; background:linear-gradient(180deg, var(--red-glow) 0%, var(--red) 60%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-shadow:none; }
.header .sub { font-size:12px; color:var(--dim); letter-spacing:2px; margin-top:2px; }

/* 分类标签 */
.tabs { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; width:100%; max-width:600px; }
.tab {
  padding: 8px 14px; border-radius: 20px; border:1px solid rgba(255,255,255,.12);
  background:var(--bg2); color:var(--dim); cursor:pointer; font-size:13px;
  white-space:nowrap; transition:all .25s; letter-spacing:1px;
}
.tab:hover { border-color:var(--red); color:var(--text); }
.tab.active { background:var(--red); color:#fff; border-color:var(--red); box-shadow:0 0 18px rgba(212,33,61,.35); }

/* 转盘容器 */
.wheel-wrap { position:relative; width:min(85vw,420px); aspect-ratio:1; margin: 4px 0; }
.wheel-wrap canvas { width:100%; height:100%; display:block; }

/* 指针 */
.pointer {
  position:absolute; top:-6px; left:50%; transform:translateX(-50%);
  width:0; height:0; border-left:16px solid transparent; border-right:16px solid transparent;
  border-top:28px solid var(--red-glow);
  filter: drop-shadow(0 0 8px var(--red-glow));
  z-index: 10;
}
.pointer::after { content:''; position:absolute; top:-34px; left:-6px; width:12px; height:12px; background:var(--red-glow); border-radius:50%; box-shadow:0 0 12px var(--red-glow); }

/* 按钮 */
.btn-row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.btn {
  padding: 12px 36px; border-radius: 28px; border:none; cursor:pointer;
  font-size:16px; font-weight:700; letter-spacing:2px; transition:all .3s; position:relative; overflow:hidden;
}
.btn-spin { background:linear-gradient(135deg, var(--red), #a01a2f); color:#fff; box-shadow:0 4px 20px rgba(212,33,61,.4); }
.btn-spin:hover:not(:disabled) { box-shadow:0 6px 30px rgba(255,51,102,.5); transform:translateY(-1px); }
.btn-spin:active:not(:disabled) { transform:scale(.96); }
.btn-spin:disabled { opacity:.4; cursor:not-allowed; }
.btn-bgm { background:var(--bg2); color:var(--text); border:1px solid rgba(255,255,255,.15); font-size:13px; padding:10px 18px; letter-spacing:1px; }
.btn-bgm.on { border-color:var(--gold); color:var(--gold); }
.btn-reset { background:transparent; color:var(--dim); border:1px solid rgba(255,255,255,.1); font-size:12px; padding:8px 16px; }

/* 结果面板 */
.result-panel {
  width:100%; max-width:600px; background:var(--bg2); border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.08); padding:16px 20px; text-align:center;
  animation: fadeIn .4s ease;
}
.result-panel .cat { font-size:12px; color:var(--dim); letter-spacing:2px; }
.result-panel .value { font-size:clamp(18px,4vw,26px); font-weight:800; color:var(--red-glow); margin:6px 0; }
.result-panel .desc { font-size:13px; color:var(--dim); font-style:italic; line-height:1.6; }

/* 历史记录 */
.history { width:100%; max-width:600px; }
.history h3 { font-size:13px; color:var(--dim); letter-spacing:2px; margin-bottom:8px; }
.history-list { display:flex; flex-wrap:wrap; gap:8px; }
.history-item {
  background:var(--bg2); border:1px solid rgba(255,255,255,.06); border-radius:20px;
  padding:6px 14px; font-size:12px; display:flex; align-items:center; gap:6px;
  animation: popIn .3s ease;
}
.history-item .hi-icon { font-size:14px; }
.history-item .hi-label { color:var(--dim); }
.history-item .hi-value { color:var(--red-glow); font-weight:600; }

/* BGM 提示 */
.bgm-indicator { position:fixed; bottom:16px; right:16px; font-size:11px; color:var(--dim); z-index:5; display:flex; align-items:center; gap:6px; }
.bgm-indicator .dot { width:6px; height:6px; border-radius:50%; background:var(--gold); animation:pulse 2s ease infinite; display:none; }
.bgm-indicator.on .dot { display:block; }

@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes popIn { from{opacity:0;transform:scale(.8)} to{opacity:1;transform:scale(1)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* 响应式 */
@media (max-width:480px) {
  .app { padding:10px; gap:10px; }
  .tab { padding:6px 10px; font-size:11px; letter-spacing:0; }
  .wheel-wrap { width:82vw; }
  .btn { padding:10px 28px; font-size:14px; }
  .btn-bgm { padding:8px 14px; font-size:11px; }
}
</style>

// ==================== 音频引擎 ====================
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.bgmOn = false;
    this.bgmNodes = [];
    this.initialized = false;
  }

  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.initialized = true;
    } catch(e) { console.warn('Audio not supported'); }
  }

  // BGM: 暗黑氛围低音 + 咒力嗡鸣
  startBgm() {
    if (!this.ctx || this.bgmOn) return;
    this.bgmOn = true;
    const ctx = this.ctx;
    const masterGain = ctx.createGain();
    masterGain.gain.value = 0.08;
    masterGain.connect(ctx.destination);
    this.bgmNodes.push(masterGain);

    // 低音嗡鸣层
    const osc1 = ctx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.value = 55;
    const gain1 = ctx.createGain();
    gain1.gain.value = 0.15;
    const filter1 = ctx.createBiquadFilter();
    filter1.type = 'lowpass';
    filter1.frequency.value = 200;
    osc1.connect(filter1).connect(gain1).connect(masterGain);
    osc1.start();

    // 中频氛围
    const osc2 = ctx.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.value = 110;
    const gain2 = ctx.createGain();
    gain2.gain.value = 0.08;
    const lfo2 = ctx.createOscillator();
    lfo2.frequency.value = 0.15;
    lfo2.type = 'sine';
    const lfoGain2 = ctx.createGain();
    lfoGain2.gain.value = 15;
    lfo2.connect(lfoGain2).connect(osc2.frequency);
    lfo2.start();
    osc2.connect(gain2).connect(masterGain);
    osc2.start();

    // 高频咒力嗡鸣
    const osc3 = ctx.createOscillator();
    osc3.type = 'triangle';
    osc3.frequency.value = 880;
    const gain3 = ctx.createGain();
    gain3.gain.value = 0.02;
    const lfo3 = ctx.createOscillator();
    lfo3.frequency.value = 0.25;
    lfo3.type = 'sawtooth';
    const lfoGain3 = ctx.createGain();
    lfoGain3.gain.value = 80;
    lfo3.connect(lfoGain3).connect(osc3.frequency);
    lfo3.start();
    osc3.connect(gain3).connect(masterGain);
    osc3.start();

    this.bgmNodes.push(osc1,osc2,osc3,lfo2,lfo3);
  }

  stopBgm() {
    this.bgmOn = false;
    for (let n of this.bgmNodes) { try { n.stop(); } catch(e){} }
    this.bgmNodes = [];
  }

  // 旋转音效: 齿轮转动 + 哒哒声
  playTick() {
    if (!this.ctx) return;
    const ctx = this.ctx;
    const osc = ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = 800 + Math.random() * 400;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.03, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.05);
  }

  // 结果音效: 咒术爆发感
  playResult() {
    if (!this.ctx) return;
    const ctx = this.ctx;
    const now = ctx.currentTime;

    // 低频冲击
    const osc1 = ctx.createOscillator();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(120, now);
    osc1.frequency.exponentialRampToValueAtTime(40, now + 0.4);
    const gain1 = ctx.createGain();
    gain1.gain.setValueAtTime(0.15, now);
    gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    osc1.connect(gain1).connect(ctx.destination);
    osc1.start(now);
    osc1.stop(now + 0.5);

    // 高频共鸣
    const osc2 = ctx.createOscillator();
    osc2.type = 'triangle';
    osc2.frequency.setValueAtTime(600, now);
    osc2.frequency.exponentialRampToValueAtTime(200, now + 0.3);
    const gain2 = ctx.createGain();
    gain2.gain.setValueAtTime(0.06, now);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    osc2.connect(gain2).connect(ctx.destination);
    osc2.start(now);
    osc2.stop(now + 0.4);
  }

  // 按钮点击音
  playClick() {
    if (!this.ctx) return;
    const ctx = this.ctx;
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = 660;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.06, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.1);
  }
}

// ==================== 粒子系统 ====================
class Particle {
  constructor(x, y, color, size, vx, vy, life) {
    this.x = x; this.y = y; this.color = color; this.size = size;
    this.vx = vx; this.vy = vy; this.life = life; this.maxLife = life;
    this.alpha = 1;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += 40 * dt; // 轻微重力
    this.life -= dt;
    this.alpha = Math.max(0, this.life / this.maxLife);
    this.size *= 0.998;
  }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = this.color;
    ctx.shadowBlur = this.size * 3;
    ctx.shadowColor = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  get dead() { return this.life <= 0; }
}

class ParticleSystem {
  constructor() { this.particles = []; }
  emit(x, y, count, color, spread, size, life) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * spread;
      this.particles.push(new Particle(
        x, y, color, size * (0.5 + Math.random()),
        Math.cos(angle) * speed, Math.sin(angle) * speed - 60,
        life * (0.6 + Math.random() * 0.4)
      ));
    }
  }
  update(dt) {
    for (let p of this.particles) p.update(dt);
    this.particles = this.particles.filter(p => !p.dead);
  }
  draw(ctx) {
    for (let p of this.particles) p.draw(ctx);
  }
  clear() { this.particles = []; }
}

// ==================== 转盘渲染器 ====================
class WheelRenderer {
  constructor(canvas, items) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.items = items;
    this.angle = 0;
    this.n = items.length;
    this.resize();
  }

  resize() {
    const wrap = this.canvas.parentElement;
    const size = wrap.clientWidth;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.canvas.width = size * dpr;
    this.canvas.height = size * dpr;
    this.canvas.style.width = size + 'px';
    this.canvas.style.height = size + 'px';
    this.size = size;
    this.cx = size / 2;
    this.cy = size / 2;
    this.radius = size / 2 - 14;
    this.dpr = dpr;
    this.draw();
  }

  draw() {
    const ctx = this.ctx;
    const dpr = this.dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, this.size, this.size);

    const n = this.n;
    const arc = (Math.PI * 2) / n;

    // 外圈发光环
    ctx.beginPath();
    ctx.arc(this.cx, this.cy, this.radius + 6, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(212,33,61,0.3)';
    ctx.lineWidth = 3;
    ctx.shadowBlur = 15;
    ctx.shadowColor = 'rgba(255,51,102,0.3)';
    ctx.stroke();
    ctx.shadowBlur = 0;

    // 外圈边框
    ctx.beginPath();
    ctx.arc(this.cx, this.cy, this.radius + 2, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 扇区
    for (let i = 0; i < n; i++) {
      const startAngle = this.angle + i * arc - Math.PI / 2;
      const endAngle = startAngle + arc;

      // 扇区填充
      ctx.beginPath();
      ctx.moveTo(this.cx, this.cy);
      ctx.arc(this.cx, this.cy, this.radius, startAngle, endAngle);
      ctx.closePath();
      const color = this.items[i].color || '#333';
      ctx.fillStyle = color;
      ctx.fill();

      // 扇区间隔线
      ctx.beginPath();
      ctx.moveTo(this.cx, this.cy);
      ctx.arc(this.cx, this.cy, this.radius, startAngle, endAngle);
      ctx.lineTo(this.cx, this.cy);
      ctx.strokeStyle = 'rgba(201,168,76,0.5)';
      ctx.lineWidth = 0.8;
      ctx.stroke();

      // 文字
      ctx.save();
      ctx.translate(this.cx, this.cy);
      ctx.rotate(startAngle + arc / 2);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#fff';
      const fontSize = Math.max(9, this.radius * 0.09);
      ctx.font = `bold ${fontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
      ctx.shadowColor = 'rgba(0,0,0,0.7)';
      ctx.shadowBlur = 2;
      ctx.fillText(this.items[i].label, this.radius - 8, fontSize * 0.35);
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // 中心圆
    const grad = ctx.createRadialGradient(this.cx, this.cy, 0, this.cx, this.cy, this.radius * 0.18);
    grad.addColorStop(0, '#1a1a2e');
    grad.addColorStop(0.7, '#0a0a0c');
    grad.addColorStop(1, 'rgba(0,0,0,0.8)');
    ctx.beginPath();
    ctx.arc(this.cx, this.cy, this.radius * 0.16, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(201,168,76,0.6)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 中心文字
    ctx.fillStyle = '#c9a84c';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `bold ${Math.max(11, this.radius * 0.1)}px serif`;
    ctx.fillText('呪', this.cx, this.cy);
  }
}

// ==================== 主应用 ====================
const CAT_KEYS = ['identity','moral','technique','tool','skill','event','domain','ending'];

class App {
  constructor() {
    this.state = {
      category: 'identity',
      results: [],
      spinning: false,
      targetAngle: 0,
      spinVelocity: 0,
      tickTimer: 0,
      lastAngle: 0,
      revolutions: 0,
    };
    this.audio = new AudioEngine();
    this.particles = new ParticleSystem();
    this.wheel = null;

    this.initDOM();
    this.initWheel();
    this.addListeners();
    this.lastFrameTime = performance.now();
    requestAnimationFrame(t => this.loop(t));
  }

  initDOM() {
    // 标签
    const tabs = document.getElementById('tabs');
    CAT_KEYS.forEach(key => {
      const tab = document.createElement('button');
      tab.className = 'tab';
      tab.textContent = CATEGORIES[key].icon + ' ' + CATEGORIES[key].name;
      tab.dataset.key = key;
      tab.addEventListener('click', () => this.switchCategory(key));
      tabs.appendChild(tab);
    });
    this.tabs = tabs;

    // 按钮
    this.btnSpin = document.getElementById('btnSpin');
    this.btnBgm = document.getElementById('btnBgm');
    this.btnReset = document.getElementById('btnReset');
    this.resultPanel = document.getElementById('resultPanel');
    this.historyList = document.getElementById('historyList');
    this.bgmIndicator = document.getElementById('bgmIndicator');

    this.btnSpin.addEventListener('click', () => this.spin());
    this.btnBgm.addEventListener('click', () => this.audio.init() || (this.audio.bgmOn ? this.stopBgm() : this.startBgm()));
    this.btnReset.addEventListener('click', () => this.reset());
  }

  initWheel() {
    const canvas = document.getElementById('wheelCanvas');
    this.wheel = new WheelRenderer(canvas, CATEGORIES[this.state.category].items);
    this.btnSpin.disabled = false;
    this.updateActiveTab();
    window.addEventListener('resize', () => this.wheel.resize());
  }

  switchCategory(key) {
    if (this.state.spinning) return;
    this.audio.init();
    this.audio.playClick();
    this.state.category = key;
    this.wheel.items = CATEGORIES[key].items;
    this.wheel.n = this.wheel.items.length;
    this.wheel.angle = 0;
    this.state.targetAngle = 0;
    this.state.spinVelocity = 0;
    this.state.lastAngle = 0;
    this.wheel.draw();
    this.resultPanel.style.display = 'none';
    this.updateActiveTab();
  }

  updateActiveTab() {
    [...this.tabs.children].forEach(t => t.classList.toggle('active', t.dataset.key === this.state.category));
  }

  spin() {
    if (this.state.spinning) return;
    this.audio.init();
    this.audio.playClick();
    this.state.spinning = true;
    this.btnSpin.disabled = true;
    this.resultPanel.style.display = 'none';
    this.particles.clear();

    // 随机目标角度: 至少转5圈 + 随机偏移
    const n = this.wheel.n;
    const arc = (Math.PI * 2) / n;
    const targetIndex = Math.floor(Math.random() * n);
    const jitter = (Math.random() - 0.5) * arc * 0.7;
    const fullSpins = (5 + Math.floor(Math.random() * 5)) * Math.PI * 2;
    this.state.targetAngle = fullSpins + targetIndex * arc + arc / 2 + jitter;
    this.state.revolutions = 0;
  }

  stop() {
    this.state.spinning = false;
    this.btnSpin.disabled = false;

    // 计算结果
    const n = this.wheel.n;
    const arc = (Math.PI * 2) / n;
    let rawAngle = (this.wheel.angle - Math.PI / 2) % (Math.PI * 2);
    if (rawAngle < 0) rawAngle += Math.PI * 2;
    const pointerAngle = 0; // 指针在顶部 (0°)
    const adjustedAngle = (pointerAngle - rawAngle + Math.PI * 2) % (Math.PI * 2);
    const index = Math.floor(adjustedAngle / arc) % n;

    const item = this.wheel.items[index];
    this.showResult(item);
    this.state.results.push({ category: CATEGORIES[this.state.category].name, ...item });
    this.updateHistory();

    // 粒子爆发 (中量: 60个粒子在指针处)
    const canvasRect = this.wheel.canvas.getBoundingClientRect();
    const px = this.wheel.cx;
    const py = 20;
    this.particles.emit(px, py, 60, '#ff3366', 180, 4, 1.5);
    this.particles.emit(px, py, 30, '#ffcc00', 140, 3, 1.2);
    this.particles.emit(px, py, 20, '#ffffff', 100, 2.5, 0.8);

    this.audio.playResult();
  }

  showResult(item) {
    this.resultPanel.style.display = 'block';
    this.resultPanel.innerHTML = `
      <div class="cat">${CATEGORIES[this.state.category].icon} ${CATEGORIES[this.state.category].name}</div>
      <div class="value">${item.label}</div>
      <div class="desc">${item.desc}</div>
    `;
  }

  updateHistory() {
    this.historyList.innerHTML = this.state.results.map(r => `
      <div class="history-item">
        <span class="hi-icon">${CATEGORIES[this.getKeyByResult(r)]?.icon || '◆'}</span>
        <span class="hi-label">${r.category}:</span>
        <span class="hi-value">${r.label}</span>
      </div>
    `).join('');
  }

  getKeyByResult(result) {
    for (let key of CAT_KEYS) {
      if (CATEGORIES[key].name === result.category) return key;
    }
    return null;
  }

  reset() {
    this.audio.init();
    this.audio.playClick();
    this.state.results = [];
    this.historyList.innerHTML = '';
    this.resultPanel.style.display = 'none';
    this.particles.clear();
  }

  startBgm() {
    this.audio.startBgm();
    this.btnBgm.textContent = '🔊 BGM';
    this.btnBgm.classList.add('on');
    this.btnBgm.classList.remove('off');
    this.bgmIndicator.classList.add('on');
    this.bgmIndicator.classList.remove('off');
  }

  stopBgm() {
    this.audio.stopBgm();
    this.btnBgm.textContent = '🔇 BGM';
    this.btnBgm.classList.remove('on');
    this.btnBgm.classList.add('off');
    this.bgmIndicator.classList.remove('on');
    this.bgmIndicator.classList.add('off');
  }

  addListeners() {
    // 键盘空格旋转
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && !this.state.spinning) {
        e.preventDefault();
        this.spin();
      }
    });
    // 点击canvas也可旋转
    this.wheel.canvas.addEventListener('click', () => {
      if (!this.state.spinning) this.spin();
    });
  }

  loop(timestamp) {
    const dt = Math.min((timestamp - this.lastFrameTime) / 1000, 0.1);
    this.lastFrameTime = timestamp;

    if (this.state.spinning) {
      const d = this.state.targetAngle - this.wheel.angle;
      const absD = Math.abs(d);

      if (absD < 0.003) {
        this.wheel.angle = this.state.targetAngle;
        this.wheel.draw();
        this.stop();
      } else {
        // ease-out cubic
        const speed = absD * 0.08 + 0.015;
        this.wheel.angle += Math.sign(d) * Math.min(speed, absD);
        this.wheel.draw();

        // tick 音效
        this.state.tickTimer += dt;
        const items = this.wheel.n;
        const arc = (Math.PI * 2) / items;
        const tickInterval = Math.max(0.015, speed * 0.3);
        if (this.state.tickTimer > tickInterval) {
          this.state.tickTimer = 0;
          this.audio.playTick();
        }

        // 旋转时微量粒子
        const canvas = this.wheel.canvas;
        const rect = canvas.getBoundingClientRect();
        const edgeX = this.wheel.cx + Math.cos(this.wheel.angle) * this.wheel.radius;
        const edgeY = this.wheel.cy + Math.sin(this.wheel.angle) * this.wheel.radius;
        if (Math.random() < 0.3) {
          this.particles.emit(edgeX, edgeY, 1, '#ff336644', 30, 1.5, 0.4);
        }
      }
    }

    // 更新粒子
    this.particles.update(dt);

    // 渲染层叠
    this.wheel.draw();
    this.particles.draw(this.wheel.ctx);

    // 高亮当前指向的扇区
    // (在 draw 之后做轻微发光指示)
    if (!this.state.spinning) {
      const ctx = this.wheel.ctx;
      const dpr = this.wheel.dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const n = this.wheel.n;
      const arc = (Math.PI * 2) / n;
      let rawAngle = (this.wheel.angle - Math.PI / 2) % (Math.PI * 2);
      if (rawAngle < 0) rawAngle += Math.PI * 2;
      const adjusted = (-rawAngle + Math.PI * 2) % (Math.PI * 2);
      const idx = Math.floor(adjusted / arc) % n;
      const startA = this.wheel.angle + idx * arc - Math.PI / 2;
      // 高亮指针所指扇区
      ctx.beginPath();
      ctx.moveTo(this.wheel.cx, this.wheel.cy);
      ctx.arc(this.wheel.cx, this.wheel.cy, this.wheel.radius + 3, startA, startA + arc);
      ctx.closePath();
      ctx.strokeStyle = 'rgba(255,51,102,0.4)';
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    requestAnimationFrame(t => this.loop(t));
  }
}

// ==================== 启动 ====================
const app = new App();
