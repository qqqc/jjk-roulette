<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>咒术转盘 · JJK</title>
<style>
:root{--bg:#060608;--bg2:#12121a;--bg3:#1a1a24;--red:#c41e3a;--glow:#ff3050;--purple:#6b21a8;--gold:#c9a84c;--text:#e0d8d0;--dim:#6b6560;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
/* 背景花纹 */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(196,30,58,.10) 0%,transparent 50%),radial-gradient(ellipse 60% 40% at 50% 100%,rgba(107,33,168,.06) 0%,transparent 50%),repeating-conic-gradient(from 0deg,rgba(255,48,80,.012) 0% .5%,transparent .5% 3%);mask-image:radial-gradient(ellipse 60% 60% at 50% 40%,black 20%,transparent 70%);animation:bgSpin 120s linear infinite}
@keyframes bgSpin{to{transform:rotate(360deg)}}
/* 四角咒字 */
.c-seal{position:fixed;pointer-events:none;z-index:0;font-family:serif;opacity:.04;animation:sealF 28s ease-in-out infinite}
.c-seal.a{top:3%;left:4%;font-size:clamp(60px,10vw,130px);color:var(--glow)}
.c-seal.b{top:4%;right:4%;font-size:clamp(50px,8vw,110px);color:var(--gold);animation-delay:-9s}
.c-seal.c{bottom:3%;left:4%;font-size:clamp(70px,12vw,150px);color:var(--gold);animation-delay:-18s}
.c-seal.d{bottom:4%;right:4%;font-size:clamp(55px,9vw,120px);color:var(--glow);animation-delay:-5s}
@keyframes sealF{0%,100%{transform:translateY(0)rotate(0deg)}33%{transform:translateY(-15px)rotate(3deg)}66%{transform:translateY(10px)rotate(-2deg)}}
/* 光点 */
.dots-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.dot{position:absolute;border-radius:50%;background:var(--glow);opacity:0;animation:dotUp linear infinite}
@keyframes dotUp{0%{transform:translateY(105vh)scale(0);opacity:0}10%{opacity:.3}90%{opacity:.06}100%{transform:translateY(-10vh)scale(1.5);opacity:0}}

/* 主容器 */
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;padding-bottom:64px}
@media(min-width:768px){.app{display:grid;grid-template-columns:240px 1fr 250px;min-height:100vh;padding:0}}

/* 顶部栏(移动) */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;gap:6px}
.top-bar .p-name{font-size:13px;font-weight:700;cursor:pointer}
.p-dots{display:flex;gap:5px}
.p-dots span{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,.12);transition:.3s}
.p-dots span.done{background:var(--gold);border-color:var(--gold)}
.p-dots span.cur{background:var(--red);border-color:var(--red);box-shadow:0 0 8px var(--glow)}
/* 移动端阶段下拉 */
.phase-menu{position:fixed;inset:0;z-index:55}
.phase-menu .pm-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6)}
.phase-menu .pm-list{position:absolute;top:44px;left:12px;right:12px;background:var(--bg2);border-radius:12px;border:1px solid rgba(255,255,255,.08);padding:8px 0;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:fadeIn .2s ease}
.pm-list .pm-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:12px;cursor:pointer;transition:.15s}
.pm-list .pm-item:hover{background:rgba(255,255,255,.03)}
.pm-list .pm-item.active{background:rgba(196,30,58,.08)}
.pm-list .pm-item.locked{opacity:.35;cursor:default}
.pm-list .pm-item .pm-dot{width:8px;height:8px;border-radius:50%;border:2px solid rgba(255,255,255,.18);flex-shrink:0}
.pm-list .pm-item.done .pm-dot{background:var(--gold);border-color:var(--gold)}
.pm-list .pm-item.active .pm-dot{background:var(--red);border-color:var(--red)}
@media(min-width:768px){.phase-menu{display:none!important}}
@media(min-width:768px){#centerDots{display:flex!important}}
@media(min-width:768px){.top-bar{display:none}}

/* 左侧栏 */
.sidebar{display:none;background:var(--bg2);border-right:1px solid rgba(255,255,255,.05);flex-direction:column;overflow-y:auto}
@media(min-width:768px){.sidebar{display:flex}}
.sb-header{padding:16px 14px 10px;flex-shrink:0}
.sb-header .sbl{font-size:10px;color:var(--dim);letter-spacing:2px}
.sb-header .sbn{font-size:15px;font-weight:800;margin:2px 0}
.sb-header .sbd{height:1px;background:rgba(255,255,255,.04);margin:8px 0}
.sb-phases{padding:0 8px;flex-shrink:0}
.sb-phase{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;transition:.2s;font-size:11px;margin:2px 0}
.sb-phase:hover{background:rgba(255,255,255,.03)}
.sb-phase .sp-dot{width:8px;height:8px;border-radius:50%;border:2px solid rgba(255,255,255,.18);flex-shrink:0;transition:.2s}
.sb-phase.active{background:rgba(196,30,58,.08);border:1px solid rgba(196,30,58,.25)}
.sb-phase.active .sp-dot{background:var(--red);border-color:var(--red);box-shadow:0 0 6px var(--glow)}
.sb-phase.done .sp-dot{background:var(--gold);border-color:var(--gold)}
.sb-phase.locked{opacity:.3;cursor:default}
.sb-phase .sp-name{color:var(--dim);font-size:11px}
.sb-phase.active .sp-name{color:var(--text);font-weight:600}
.sb-events{flex:1;overflow-y:auto;padding:8px 10px}
.sb-evt{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:.2s;font-size:11px;border:1px solid transparent}
.sb-evt:hover{background:rgba(255,255,255,.02)}
.sb-evt .se-dot{width:7px;height:7px;border-radius:50%;border:2px solid rgba(255,255,255,.15);flex-shrink:0;transition:.2s}
.sb-evt.cur .se-dot{background:var(--red);border-color:var(--red);box-shadow:0 0 6px var(--glow)}
.sb-evt.done .se-dot{background:var(--gold);border-color:var(--gold)}
.sb-evt.cur{background:rgba(196,30,58,.06);border-color:rgba(196,30,58,.2)}
.sb-evt.done{opacity:.5}
.sb-evt .se-num{color:var(--dim);font-size:9px;width:14px;text-align:center}
.sb-evt .se-title{color:var(--dim);font-size:11px}
.sb-evt.cur .se-title{color:var(--text);font-weight:600}
.sb-evt.locked{opacity:.3;cursor:default}
.sb-footer{flex-shrink:0;padding:10px 14px;border-top:1px solid rgba(255,255,255,.04)}
.sb-edit{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:10px;color:var(--dim);padding:6px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.08);transition:.2s}
.sb-edit:hover{color:var(--text);border-color:rgba(255,255,255,.2)}

/* 中央 */
.center-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 12px;gap:8px;overflow-y:auto}
@media(min-width:768px){.center-area{padding-top:20px}}
.round-title{font-size:15px;font-weight:700;text-align:center}
/* 转盘 */
.wheel-wrap{position:relative;width:min(80vw,380px);aspect-ratio:1;flex-shrink:0}
.wheel-wrap canvas{width:100%;height:100%}
.wheel-wrap .ptr{position:absolute;top:-8px;left:50%;transform:translateX(-50%);z-index:10;width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:26px solid var(--glow);filter:drop-shadow(0 0 6px var(--glow))}
.wheel-wrap .ptr::after{content:'';position:absolute;top:-28px;left:-3px;width:7px;height:12px;background:var(--glow);border-radius:4px;box-shadow:0 0 6px var(--glow)}
.p-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:8}
.center-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;width:20%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,#1e1e2e,#0a0a0c);border:2px solid rgba(201,168,76,.45);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:serif;font-size:clamp(14px,3.5vw,20px);color:var(--gold);box-shadow:0 0 18px rgba(0,0,0,.5);transition:.2s}
.center-btn:hover{border-color:var(--gold);box-shadow:0 0 28px rgba(201,168,76,.25)}
/* 按钮 */
.btn-spin{width:100%;max-width:320px;padding:12px;border-radius:26px;border:none;cursor:pointer;font-size:15px;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,#e0304a,#901030);color:#fff;box-shadow:0 4px 20px rgba(224,48,74,.35);transition:.3s;animation:btnGlow 2s ease infinite}
.btn-spin:disabled{opacity:.4;cursor:not-allowed;animation:none}
@keyframes btnGlow{0%,100%{box-shadow:0 4px 20px rgba(224,48,74,.35)}50%{box-shadow:0 6px 32px rgba(255,48,80,.55)}}
.btn-next{display:none;width:100%;max-width:320px;padding:10px;border-radius:26px;border:1px solid var(--gold);cursor:pointer;font-size:14px;font-weight:700;letter-spacing:1px;background:transparent;color:var(--gold);transition:.3s}
.btn-next:hover{border-color:#fff;color:#fff}
.btn-reset{display:inline-block;padding:8px 18px;border-radius:18px;border:1px solid rgba(255,255,255,.08);cursor:pointer;font-size:12px;background:transparent;color:var(--dim);transition:.2s}
.btn-reset:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.btn-char{width:100%;max-width:320px;margin-top:8px;padding:12px;border-radius:26px;border:none;cursor:pointer;font-size:15px;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,var(--gold),#8a7030);color:#1a1a1a;box-shadow:0 4px 20px rgba(201,168,76,.3);transition:.3s}
.btn-char:hover{box-shadow:0 6px 30px rgba(201,168,76,.5);transform:translateY(-1px)}
/* 结果面板 */
.result-panel{width:100%;max-width:480px;background:var(--bg2);border-radius:var(--r);padding:14px 18px;text-align:center;animation:fadeIn .35s ease;display:none}
.result-panel .rp-cat{font-size:10px;color:var(--dim);letter-spacing:2px}
.result-panel .rp-val{font-size:clamp(18px,4vw,24px);font-weight:800;margin:4px 0 6px;letter-spacing:1px}
.result-panel .rp-desc{font-size:13px;color:rgba(224,216,208,.7);line-height:1.6;margin-top:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* 右侧面板 */
.right-panel{display:none;background:var(--bg2);border-left:1px solid rgba(255,255,255,.05);flex-direction:column;overflow-y:auto}
@media(min-width:768px){.right-panel{display:flex}}
.rp-sec{border-bottom:1px solid rgba(255,255,255,.03)}
.rp-sec h4{padding:12px 12px 6px;font-size:11px;color:var(--dim);letter-spacing:1px}
.rp-traits{padding:6px 12px 12px;display:flex;flex-wrap:wrap;gap:4px}
.rp-traits .tag{padding:3px 8px;border-radius:10px;font-size:10px;background:rgba(255,255,255,.05);color:var(--text);border:1px solid rgba(255,255,255,.08)}
.rp-traits .empty{color:var(--dim);font-size:10px;padding:4px}
.rp-hist{padding:6px 12px 12px;display:flex;flex-direction:column;gap:4px;max-height:45vh;overflow-y:auto}
.rp-hist .rh{display:flex;gap:6px;align-items:flex-start;font-size:10px;padding:3px 6px;border-radius:4px;background:rgba(255,255,255,.012);border-left:3px solid transparent}
.rp-hist .rh .rhd{width:5px;height:5px;border-radius:2px;margin-top:3px;flex-shrink:0}

/* 底部Tab(移动端) */
.btm-tabs{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;background:var(--bg2);border-top:1px solid rgba(255,255,255,.06);padding:3px 0 env(safe-area-inset-bottom,3px)}
.btm-tabs .bt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 0;cursor:pointer;color:var(--dim);font-size:10px;gap:2px;transition:.2s;position:relative}
.btm-tabs .bt.active{color:#fff}
.btm-tabs .bt .bti{font-size:18px}
.btm-tabs .bt .btb{position:absolute;top:2px;left:calc(50% + 10px);min-width:15px;height:15px;border-radius:8px;background:var(--red);color:#fff;font-size:9px;display:none;align-items:center;justify-content:center;padding:0 3px}
@media(min-width:768px){.btm-tabs{display:none}}
/* 移动Tab视图 */
.tab-view{display:none;position:fixed;top:44px;left:0;right:0;bottom:60px;z-index:40;background:var(--bg);overflow-y:auto;padding:12px}
.tab-view.on{display:block}
@media(min-width:768px){.tab-view{display:none!important}}
.tab-card{background:var(--bg2);border-radius:var(--r);padding:14px}
.tab-card h4{font-size:10px;color:var(--dim);letter-spacing:2px;margin-bottom:8px}
.tab-card .tr{display:flex;justify-content:space-between;font-size:12px;padding:3px 6px;border-radius:4px;background:rgba(255,255,255,.012)}
.tab-card .tr .tk{color:var(--dim)}
.tab-card .tr .tv{font-weight:600}
.tab-card .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tab-card .tags .tag{padding:2px 8px;border-radius:10px;font-size:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
.th-list{display:flex;flex-direction:column;gap:6px}
.th-list .th{display:flex;gap:8px;align-items:flex-start;font-size:12px;padding:8px 10px;border-radius:8px;background:var(--bg2);border-left:3px solid transparent}
.th-list .th .thd{width:7px;height:7px;border-radius:3px;margin-top:3px;flex-shrink:0}
.th-list .th .thb{display:flex;flex-direction:column;gap:2px}
.th-list .th .thl{color:var(--dim);font-size:9px;letter-spacing:1px}
.th-list .th .thv{font-weight:600}
.th-list .th .thdesc{color:rgba(224,216,208,.65);font-size:11px;line-height:1.5;margin-top:2px}
.empty{text-align:center;padding:30px;color:var(--dim);font-size:12px}
/* Toast */
.toast{position:fixed;top:50px;left:50%;transform:translateX(-50%);z-index:70;background:var(--bg2);border:1px solid rgba(255,255,255,.08);padding:8px 18px;border-radius:18px;font-size:12px;color:var(--text);pointer-events:none;animation:toastIn .3s ease,toastOut .3s ease 1.6s forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}}
@keyframes toastOut{to{opacity:0;transform:translateX(-50%) translateY(-8px)}}

/* 编辑面板 */
.editor-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7)}
.editor-panel{position:fixed;top:0;right:0;bottom:0;width:min(420px,100vw);z-index:101;background:var(--bg);border-left:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease}
.editor-panel.open{transform:translateX(0)}
.editor-panel .ep-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.ep-header h3{font-size:14px;font-weight:700;letter-spacing:1px}
.ep-close{cursor:pointer;font-size:20px;color:var(--dim);transition:.2s}
.ep-close:hover{color:var(--text)}
.ep-body{flex:1;overflow-y:auto;padding:12px 16px}
.ep-body .ep-phase{margin-bottom:12px}
.ep-body .ep-phase-header{display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 0;font-size:13px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.04)}
.ep-body .ep-round{padding:6px 0 6px 16px;border-left:2px solid rgba(255,255,255,.06);margin:6px 0}
.ep-body .ep-round-header{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim);margin-bottom:4px}
.ep-body .ep-round-header input{background:var(--bg2);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:3px 6px;border-radius:4px;font-size:11px;width:120px}
.ep-body .ep-item{display:flex;align-items:center;gap:6px;padding:4px 6px;margin:2px 0;border-radius:4px;background:rgba(255,255,255,.02);font-size:11px;flex-wrap:wrap}
.ep-item input[type=text]{background:var(--bg2);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:3px 6px;border-radius:4px;font-size:10px;width:90px}
.ep-item input[type=text].w{width:40px}
.ep-item input[type=color]{width:22px;height:22px;border:none;cursor:pointer;background:transparent;padding:0}
.ep-item textarea{background:var(--bg2);border:1px solid rgba(255,255,255,.1);color:var(--text);padding:4px 6px;border-radius:4px;font-size:10px;width:100%;min-width:200px;resize:vertical;font-family:inherit}
.ep-item .tag-row{display:flex;flex-wrap:wrap;gap:3px;align-items:center;margin-top:4px}
.ep-item .tag-chip{display:flex;align-items:center;gap:2px;padding:1px 6px;border-radius:8px;background:rgba(255,48,80,.15);color:var(--glow);font-size:9px}
.ep-item .tag-chip .x{cursor:pointer;font-size:10px;opacity:.6}
.ep-item .tag-chip .x:hover{opacity:1}
.ep-actions{display:flex;gap:4px;flex-shrink:0;margin-top:4px}
.ep-actions button{font-size:9px;padding:3px 8px;border-radius:4px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--dim);cursor:pointer;transition:.2s}
.ep-actions button:hover{color:var(--text);border-color:rgba(255,255,255,.3)}
.ep-actions button.del:hover{color:var(--red);border-color:var(--red)}
.ep-footer{flex-shrink:0;padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);display:flex;gap:8px;flex-wrap:wrap}
.ep-footer button{padding:8px 16px;border-radius:18px;border:1px solid rgba(255,255,255,.15);background:var(--bg2);color:var(--text);cursor:pointer;font-size:11px;letter-spacing:1px;transition:.2s}
.ep-footer button:hover{background:var(--bg3)}
.ep-footer button.primary{background:var(--red);border-color:var(--red);color:#fff}
.ep-footer button.primary:hover{background:#d42a4a}

@media(max-width:480px){
  .app{padding-bottom:60px}
  .wheel-wrap{width:82vw}
  .btn-spin{max-width:280px;font-size:14px}
  .btn-next{max-width:280px}
  .editor-panel{width:100vw}
}
</style>
</head>
<body>
<div class="dots-bg" id="dotsBg"></div>
<div class="c-seal a">呪</div><div class="c-seal b">術</div><div class="c-seal c">封</div><div class="c-seal d">解</div>

<div class="app" id="app">
  <div class="top-bar" id="topBar">
    <span class="p-name" id="topPhase" onclick="togglePhaseMenu()">🧬 身份奠基</span>
    <div class="p-dots" id="topDots"></div>
    <span style="font-size:18px;cursor:pointer;padding:0 6px" onclick="toggleEditor()" title="编辑数据">⚙️</span>
  </div>
  <!-- 移动端阶段选择下拉 -->
  <div class="phase-menu" id="phaseMenu" style="display:none"><div class="pm-backdrop" onclick="togglePhaseMenu()"></div><div class="pm-list" id="pmList"></div></div>
  <div class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="sbl">JUJUTSU KAISEN ROULETTE</div>
      <div class="sbn" id="sbTitle">咒 术 转 盘</div>
      <div class="sbd"></div>
    </div>
    <div class="sb-phases" id="sbPhases"></div>
    <div class="sb-events" id="sbEvents"></div>
    <div class="sb-footer"><div class="sb-edit" onclick="toggleEditor()">⚙️ 编辑数据</div></div>
  </div>
  <div class="center-area" id="centerArea">
    <div class="round-title" id="roundTitle"></div>
    <div class="p-dots" id="centerDots" style="display:none"></div>
    <div class="wheel-wrap" id="wheelWrap">
      <div class="ptr"></div>
      <canvas id="wheelCanvas"></canvas>
      <canvas class="p-canvas" id="pCanvas"></canvas>
      <div class="center-btn" id="centerBtn" onclick="centerClick()">呪</div>
    </div>
    <button class="btn-spin" id="btnSpin" onclick="spin()">🌀 点击旋转</button>
    <button class="btn-next" id="btnNext" onclick="goNext()">→ 下一轮</button>
    <div style="margin-top:4px"><button class="btn-reset" id="btnReset" onclick="resetGame()">↺ 重置本轮</button></div>
    <div class="result-panel" id="resultPanel"></div>
    <button class="btn-char" id="btnChar" style="display:none" onclick="showToast('角色卡功能即将上线')">🎴 生成角色卡</button>
  </div>
  <div class="right-panel" id="rightPanel">
    <div class="rp-sec"><h4>👤 角色特质</h4><div class="rp-traits" id="rpTraits"><span class="empty">尚未抽取</span></div></div>
    <div class="rp-sec"><h4>📋 事件历史</h4><div class="rp-hist" id="rpHist"><span class="empty" style="padding:4px">尚未抽取</span></div></div>
  </div>
</div>

<div class="btm-tabs" id="btmTabs">
  <div class="bt active" data-t="wheel"><span class="bti">🎯</span>转盘<span class="btb" id="btbW"></span></div>

// ========================================================= GAME STATE =========================================================
let curPhase=0,curRound=0;

}).sort((a,b)=>a.order-b.order)[curRound];
const activeRounds=()=>ph().rounds.filter(r=>{
  if(!r.cond)return true;
  return state.traits.includes(r.cond);
}).sort((a,b)=>a.order-b.order);
const isRoundDone=(r)=>{if(!r)return false;return state.results.some(rr=>rr.roundId===r.id)};

// ========================================================= WHEEL =========================================================
function _dark(h,amt){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `rgb(${Math.floor(r*(1-amt))},${Math.floor(g*(1-amt))},${Math.floor(b*(1-amt))})`}
function buildWheel(items){
  const canvas=document.getElementById('wheelCanvas');
  const w=canvas.parentElement.clientWidth,dpr=Math.min(devicePixelRatio||1,2);
  canvas.width=w*dpr;canvas.height=w*dpr;canvas.style.width=w+'px';canvas.style.height=w+'px';
  const totalW=items.reduce((s,i)=>s+(i.w||1),0);
  return{canvas,ctx:canvas.getContext('2d'),size:w,dpr,cx:w/2,cy:w/2,radius:w/2-14,
    sectors:items.map(i=>({...i,arc:(i.w||1)/totalW*Math.PI*2})),
    draw(){const ctx=this.ctx,dpr=this.dpr;ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,this.size,this.size);
      ctx.beginPath();ctx.arc(this.cx,this.cy,this.radius+6,0,Math.PI*2);ctx.strokeStyle='rgba(212,33,61,0.3)';ctx.lineWidth=3;ctx.shadowBlur=15;ctx.shadowColor='rgba(255,51,102,0.3)';ctx.stroke();ctx.shadowBlur=0;
      ctx.beginPath();ctx.arc(this.cx,this.cy,this.radius+2,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=2;ctx.stroke();
      let a=wheel.angle-Math.PI/2;
      for(let s of this.sectors){const sa=a,ea=a+s.arc;
        ctx.beginPath();ctx.moveTo(this.cx,this.cy);ctx.arc(this.cx,this.cy,this.radius,sa,ea);ctx.closePath();
        ctx.fillStyle=s.c||'#333';ctx.fill();
        ctx.beginPath();ctx.moveTo(this.cx,this.cy);ctx.arc(this.cx,this.cy,this.radius,sa,ea);ctx.lineTo(this.cx,this.cy);
        ctx.strokeStyle='rgba(201,168,76,0.5)';ctx.lineWidth=.8;ctx.stroke();
        ctx.save();ctx.translate(this.cx,this.cy);ctx.rotate(sa+s.arc/2);ctx.textAlign='right';ctx.fillStyle='#fff';
        const fs=Math.max(9,this.radius*.09);ctx.font=`bold ${fs}px "PingFang SC","Microsoft YaHei",sans-serif`;
        ctx.shadowColor='rgba(0,0,0,0.7)';ctx.shadowBlur=2;ctx.fillText(s.l,this.radius-8,fs*.35);ctx.shadowBlur=0;ctx.restore();a=ea;}
      const grad=ctx.createRadialGradient(this.cx,this.cy,0,this.cx,this.cy,this.radius*.18);
      grad.addColorStop(0,'#1a1a2e');grad.addColorStop(.7,'#0a0a0c');grad.addColorStop(1,'rgba(0,0,0,0.8)');
      ctx.beginPath();ctx.arc(this.cx,this.cy,this.radius*.16,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
      ctx.strokeStyle='rgba(201,168,76,0.6)';ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle='#c9a84c';ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`bold ${Math.max(11,this.radius*.1)}px serif`;ctx.fillText('呪',this.cx,this.cy);
    }
  };
}

// ========================================================= PARTICLES =========================================================
class Particle{constructor(x,y,c,s,vx,vy,l){this.x=x;this.y=y;this.c=c;this.s=s;this.vx=vx;this.vy=vy;this.l=l;this.ml=l;this.a=1}update(dt){this.x+=this.vx*dt;this.y+=this.vy*dt;this.vy+=25*dt;this.l-=dt;this.a=Math.max(0,this.l/this.ml);this.s*=.997}get dead(){return this.l<=0}}
class ParticleSystem{constructor(canvas){this.cv=canvas;this.ctx=canvas.getContext('2d');this.parts=[]}
  emit(x,y,n,c,sp,sz,l){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*sp;this.parts.push(new Particle(x,y,c,sz*(.5+Math.random()),Math.cos(a)*s,Math.sin(a)*s-40,l*(.6+Math.random()*.4)))}}
  update(dt){for(let p of this.parts)p.update(dt);this.parts=this.parts.filter(p=>!p.dead)}
  clear(){this.parts=[]}}

function initParticles(){const pc=document.getElementById('pCanvas');particles=new ParticleSystem(pc);}

// ========================================================= RENDER =========================================================
function refreshAll(){refreshTopBar();refreshSidebar();refreshRound();refreshRight();refreshTabs();updateBadges();}
function refreshAfterSpin(){refreshTopBar();refreshSidebar();refreshRight();refreshTabs();updateBadges();}
function getCurrentRoundIndex(){const ar=activeRounds();return ar.findIndex(r=>r===rd())}

function refreshTopBar(){
  document.getElementById('topPhase').textContent=ph().icon+' '+ph().name;
  const ar=activeRounds();const renderDots=(id)=>{const el=document.getElementById(id);el.innerHTML='';ar.forEach((r,i)=>{const d=document.createElement('span');if(isRoundDone(r))d.className='done';if(r.id===rd().id)d.className='cur';el.appendChild(d)})};
  renderDots('topDots');renderDots('centerDots');
}
function refreshSidebar(){
  if(window.innerWidth<768)return;
  const sbPh=document.getElementById('sbPhases');sbPh.innerHTML=DATA.phases.map((p,i)=>{
    const done=p.rounds.length>0&&p.rounds.every(r=>isRoundDone(r)||(r.cond&&!state.traits.includes(r.cond)));
    const isCur=i===curPhase;const locked=i>curPhase&&!isPhaseDone()&&i!==curPhase;
    let cls='sb-phase';if(locked)cls+=' locked';if(isCur)cls+=' active';if(done&&!isCur)cls+=' done';
    return `<div class="${cls}" onclick="switchPhase(${i})"><span class="sp-dot"></span><span class="sp-name">${p.icon} ${p.name}</span></div>`;
  }).join('');
  const sbEv=document.getElementById('sbEvents');const ar=activeRounds();
  sbEv.innerHTML=ar.map((r,i)=>{
    const done=isRoundDone(r);const cur=r.id===rd().id;
    let cls='sb-evt';if(cur)cls+=' cur';if(done)cls+=' done';
    return `<div class="${cls}" onclick="goRound(${i})"><span class="se-dot"></span><span class="se-num">${done?'✓':(i+1)}</span><span class="se-title">${r.icon} ${r.title}</span></div>`;
  }).join('');
}
function refreshRound(){
  const r=rd();if(!r)return;
  document.getElementById('roundTitle').innerHTML=`<span style="font-size:18px">${r.icon}</span> 第${getCurrentRoundIndex()+1}转：${r.title}`;
  wheel=buildWheel(r.items);wheel.angle=0;state.targetAngle=0;initParticles();wheel.draw();
  document.getElementById('resultPanel').style.display='none';
  const done=isRoundDone(r);
  document.getElementById('btnSpin').disabled=done;
  document.getElementById('btnSpin').textContent=done?'✅ 已抽取':'🌀 点击旋转';
  document.getElementById('btnNext').style.display='none';
  document.getElementById('btnChar').style.display=isPhaseDone()&&ph().rounds.length>0?'block':'none';
}
function refreshRight(){
  if(window.innerWidth<768)return;
  document.getElementById('rpTraits').innerHTML=state.traits.length?state.traits.map(t=>`<span class="tag">${t}</span>`).join(''):'<span class="empty">尚未抽取</span>';
  document.getElementById('rpHist').innerHTML=state.results.length?state.results.map(r=>`<div class="rh" style="border-left-color:${r.c||'#333'}"><span class="rhd" style="background:${r.c||'#333'}"></span><span style="color:var(--dim);font-size:9px">${r.rname}:</span><span style="font-weight:600;font-size:10px">${r.label}</span></div>`).join(''):'<span class="empty" style="padding:4px">尚未抽取</span>';
}
function refreshTabs(){
  const tp=document.getElementById('tvPerson'),th=document.getElementById('tvHist');
  tp.innerHTML=state.traits.length?`<div class="tab-card"><h4>👤 角色特质</h4><div class="tags">${state.traits.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>`:'<div class="empty">暂无特质</div>';
  th.innerHTML=state.results.length?`<div class="th-list">${state.results.map(r=>`<div class="th" style="border-left-color:${r.c||'#333'}"><span class="thd" style="background:${r.c||'#333'}"></span><div class="thb"><span class="thl">${r.rname}</span><span class="thv">${r.label}</span><span class="thdesc">${r.desc||''}</span></div></div>`).join('')}</div>`:'<div class="empty">暂无事件记录</div>';
}
function updateBadges(){
  const bh=document.getElementById('btbH'),bp=document.getElementById('btbP');
  bh.style.display=state.results.length&&state.curTab!=='hist'?'flex':'none';if(bh.style.display!=='none')bh.textContent=state.results.length;
  bp.style.display=state.traits.length&&state.curTab!=='person'?'flex':'none';if(bp.style.display!=='none')bp.textContent=state.traits.length;
}

// ========================================================= ACTIONS =========================================================
function showToast(msg){const c=document.getElementById('toastContainer'),d=document.createElement('div');d.className='toast';d.textContent=msg;c.appendChild(d);setTimeout(()=>d.remove(),2000)}
function applyEffects(item){
  if(item.tags){item.tags.forEach(t=>{if(!state.traits.includes(t))state.traits.push(t)})}
}
function switchPhase(i){
  if(state.spinning)return;
  if(i>curPhase&&!isPhaseDone()){showToast('当前阶段未完成，无法进入下一阶段');return}
  curPhase=i;curRound=0;refreshAll();wheel.angle=0;state.targetAngle=0;wheel.draw();document.getElementById('resultPanel').style.display='none';
  document.getElementById('phaseMenu').style.display='none';
}
function togglePhaseMenu(){
  const el=document.getElementById('phaseMenu');
  if(el.style.display==='none'){
    el.style.display='block';
    const list=document.getElementById('pmList');
    list.innerHTML=DATA.phases.map((p,i)=>{
      const done=p.rounds.length>0&&p.rounds.every(r=>isRoundDone(r)||(r.cond&&!state.traits.includes(r.cond)));
      const locked=i>curPhase&&!isPhaseDone()&&i!==curPhase;
      const isCur=i===curPhase;
      let cls='pm-item';if(locked)cls+=' locked';if(isCur)cls+=' active';if(done&&!isCur)cls+=' done';
      return `<div class="${cls}" onclick="${locked?'':'switchPhase('+i+')'}"><span class="pm-dot"></span><span>${p.icon} ${p.name}</span>${locked?' 🔒':done?' ✓':''}</div>`;
    }).join('');
  }else{el.style.display='none'}
}
function goRound(i){
  if(state.spinning)return;const ar=activeRounds();
  if(i>=ar.length){showToast('该轮次不存在');return}
  if(isRoundDone(ar[i])){showToast('该轮已抽取');return}
  curRound=i;refreshAll();wheel.angle=0;state.targetAngle=0;wheel.draw();document.getElementById('resultPanel').style.display='none';
}
function goNext(){
  const ar=activeRounds();for(let i=0;i<ar.length;i++){if(!isRoundDone(ar[i])&&ar[i].id!==rd().id){curRound=i;break}}
  refreshAll();wheel.angle=0;state.targetAngle=0;wheel.draw();document.getElementById('resultPanel').style.display='none';
}
function resetGame(){
  if(state.spinning)return;
  if(state.results.length>0&&!confirm('确定重置本轮？所有已抽取结果和角色特质将清除。'))return;
  state.results=[];state.traits=[];
  curRound=0;state.targetAngle=0;wheel.angle=0;
  refreshAll();wheel.draw();document.getElementById('resultPanel').style.display='none';
  document.getElementById('btnNext').style.display='none';showToast('↺ 已重置');
}
function spin(){
  if(state.spinning||isRoundDone(rd()))return;state.spinning=true;
  document.getElementById('btnSpin').disabled=true;document.getElementById('btnSpin').textContent='⏳ 旋转中…';
  document.getElementById('resultPanel').style.display='none';document.getElementById('btnNext').style.display='none';
  particles.clear();
  const ss=wheel.sectors,tw=ss.reduce((s,se)=>s+(se.w||1),0);let r=Math.random()*tw,ti=0;
  for(let i=0;i<ss.length;i++){r-=ss[i].w||1;if(r<=0){ti=i;break}}
  const arc=ss[ti].arc,j=(Math.random()-.5)*arc*.6;let ca=0;for(let i=0;i<ti;i++)ca+=ss[i].arc;
  state.targetAngle=wheel.angle+(6+Math.floor(Math.random()*4))*Math.PI*2-ca-arc/2+j;
  state.startAngle=wheel.angle;state.startTime=performance.now();state.duration=3000+Math.random()*2000;
}
function stop(){
  state.spinning=false;document.getElementById('btnSpin').disabled=false;document.getElementById('btnSpin').textContent='✅ 已抽取';
  let norm=(-wheel.angle)%(Math.PI*2);if(norm<0)norm+=Math.PI*2;let cum=0,idx=0;
  for(let i=0;i<wheel.sectors.length;i++){cum+=wheel.sectors[i].arc;if(norm<cum){idx=i;break}}
  const item=wheel.sectors[idx];
  state.results.push({roundId:rd().id,rname:`${rd().icon} ${rd().title}`,prop:rd().prop,label:item.l,desc:item.d||'',c:item.c||'#333'});
  applyEffects(item);
  const panel=document.getElementById('resultPanel');panel.style.display='block';panel.style.borderLeft=`4px solid ${item.c||'#333'}`;
  panel.innerHTML=`<div class="rp-cat">${rd().icon} ${rd().title}</div><div class="rp-val" style="color:${item.c||'#333'};text-shadow:0 0 12px ${item.c||'#333'}66">${item.l}</div><div class="rp-desc">${item.d||''}</div>`;
  particles.emit(wheel.cx,20,50,item.c||'#ff3050',160,3.5,2);particles.emit(wheel.cx,20,25,'#ffcc00',110,2.5,1.4);
  // show next button if more rounds
  const ar=activeRounds();const undone=ar.filter(r=>!isRoundDone(r));
  if(undone.length>0){document.getElementById('btnNext').style.display='block'}
  document.getElementById('btnChar').style.display=isPhaseDone()&&ph().rounds.length>0?'block':'none';
  refreshAfterSpin();
}
function centerClick(){if(state.spinning)return;if(isRoundDone(rd())){showToast('已抽取，请点击「→ 下一轮」或左侧选择下一项');return}spin()}
function setTab(tab){
  state.curTab=tab;document.querySelectorAll('.btm-tabs .bt').forEach(b=>b.classList.toggle('active',b.dataset.t===tab));
  document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('on'));
  if(tab!=='wheel'){const v=document.getElementById(tab==='person'?'tvPerson':'tvHist');if(v)v.classList.add('on')}
  updateBadges();
}

// ========================================================= EDITOR =========================================================
function toggleEditor(){
  state.editorOpen=!state.editorOpen;
  document.getElementById('edOverlay').style.display=state.editorOpen?'block':'none';
  document.getElementById('edPanel').classList.toggle('open',state.editorOpen);
  if(state.editorOpen)renderEditor();
}
function renderEditor(){
  const body=document.getElementById('edBody');let h='';
  DATA.phases.forEach((p,pi)=>{
    h+=`<div class="ep-phase"><div class="ep-phase-header"><span>${p.icon||'◆'}</span><input value="${p.name}" onchange="DATA.phases[${pi}].name=this.value" style="font-weight:700;width:140px" /></div>`;
    p.rounds.forEach((r,ri)=>{
      h+=`<div class="ep-round"><div class="ep-round-header">
        #<input type="number" min="1" value="${r.order||ri+1}" style="width:40px" onchange="DATA.phases[${pi}].rounds[${ri}].order=parseInt(this.value)||1" />
        icon:<input value="${r.icon||''}" style="width:40px" onchange="DATA.phases[${pi}].rounds[${ri}].icon=this.value" />
        title:<input value="${r.title}" onchange="DATA.phases[${pi}].rounds[${ri}].title=this.value" />
        cond:<input value="${r.cond||''}" onchange="DATA.phases[${pi}].rounds[${ri}].cond=this.value||null" style="width:60px" />
      </div>`;
      r.items.forEach((it,ii)=>{
        h+=`<div class="ep-item"><input value="${it.l}" onchange="DATA.phases[${pi}].rounds[${ri}].items[${ii}].l=this.value" /> w:<input class="w" type="number" min="1" max="10" value="${it.w||1}" onchange="DATA.phases[${pi}].rounds[${ri}].items[${ii}].w=parseInt(this.value)||1" /> <input type="color" value="${it.c||'#333'}" onchange="DATA.phases[${pi}].rounds[${ri}].items[${ii}].c=this.value" /><div style="flex-basis:100%"><textarea rows="2" onchange="DATA.phases[${pi}].rounds[${ri}].items[${ii}].d=this.value">${it.d||''}</textarea></div><div class="tag-row">${(it.tags||[]).map((t,ti)=>`<span class="tag-chip">${t}<span class="x" onclick="DATA.phases[${pi}].rounds[${ri}].items[${ii}].tags.splice(${ti},1);renderEditor()">×</span></span>`).join('')}<input value="" placeholder="+标签" style="width:50px" onkeydown="if(event.key==='Enter'){const v=this.value.trim();if(v){if(!DATA.phases[${pi}].rounds[${ri}].items[${ii}].tags)DATA.phases[${pi}].rounds[${ri}].items[${ii}].tags=[];DATA.phases[${pi}].rounds[${ri}].items[${ii}].tags.push(v);renderEditor();}}" /></div><div class="ep-actions"><button class="del" onclick="DATA.phases[${pi}].rounds[${ri}].items.splice(${ii},1);renderEditor()">✕ 删除选项</button></div></div>`;
      });
      h+=`<div class="ep-actions" style="margin-top:6px"><button onclick="DATA.phases[${pi}].rounds[${ri}].items.push({l:'新选项',w:1,c:'#333',d:'',tags:[]});renderEditor()">+ 添加选项</button><button class="del" onclick="DATA.phases[${pi}].rounds.splice(${ri},1);renderEditor()">✕ 删除轮次</button></div></div>`;
    });
    h+=`<div class="ep-actions"><button onclick="DATA.phases[${pi}].rounds.push({id:'p'+(pi+1)+'_'+Date.now(),title:'新轮次',icon:'◆',order:DATA.phases[${pi}].rounds.length+1,cond:null,prop:'',items:[{l:'选项1',w:1,c:'#333',d:'',tags:[]}]});renderEditor()">+ 添加轮次</button></div></div>`;
  });
  h+=`<div class="ep-actions" style="padding:10px 0"><button onclick="DATA.phases.push({id:'p'+(DATA.phases.length+1),name:'新阶段',icon:'◆',rounds:[]});renderEditor()">+ 添加阶段</button></div>`;
  body.innerHTML=h;
}
function edSave(){
  localStorage.setItem('jjk_data',JSON.stringify(DATA));
  // refresh only if current round still exists
  const r=rd();if(!r){curRound=0}
  refreshAll();if(rd()){wheel=buildWheel(rd().items)}
  wheel.angle=0;wheel.draw();showToast('💾 已保存');
}
function edExport(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='data.json';a.click();
}
function edImport(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const f=e.target.files[0];if(f){const fr=new FileReader();fr.onload=ev=>{try{DATA=JSON.parse(ev.target.result);edSave();showToast('📤 已导入')}catch(x){showToast('导入失败：JSON格式错误')}};fr.readAsText(f)}};
  inp.click();
}
function edReset(){if(confirm('重置为默认数据？所有未保存修改将丢失。')){DATA=JSON.parse(JSON.stringify(SEED_DATA));localStorage.removeItem('jjk_data');refreshAll();wheel=buildWheel(rd().items);wheel.angle=0;wheel.draw();toggleEditor();showToast('🗑 已重置')}}

// ========================================================= LOOP =========================================================
let lft=performance.now();
function loop(t){
  const dt=Math.min((t-lft)/1000,.1);lft=t;
  if(state.spinning){const p=Math.min((t-state.startTime)/state.duration,1),e=1-Math.pow(1-p,3);wheel.angle=state.startAngle+(state.targetAngle-state.startAngle)*e;if(p>=1){wheel.angle=state.targetAngle;wheel.draw();stop()}}
  if(particles){particles.update(dt);if(wheel){const pc=document.getElementById('pCanvas'),pctx=particles.ctx,sw=wheel.size;pc.width=wheel.canvas.width;pc.height=wheel.canvas.height;pctx.setTransform(wheel.dpr,0,0,wheel.dpr,0,0);pctx.clearRect(0,0,sw,sw);for(let p of particles.parts){pctx.save();pctx.globalAlpha=p.a;pctx.fillStyle=p.c;pctx.shadowBlur=p.s*4;pctx.shadowColor=p.c;pctx.beginPath();pctx.arc(p.x,p.y,p.s,0,Math.PI*2);pctx.fill();pctx.restore()}}}
  if(wheel)wheel.draw();
  if(wheel&&!state.spinning){const ctx=wheel.ctx,dpr=wheel.dpr;ctx.setTransform(dpr,0,0,dpr,0,0);const ss=wheel.sectors;let norm=(-wheel.angle)%(Math.PI*2);if(norm<0)norm+=Math.PI*2;let cum=0,idx=0;for(let i=0;i<ss.length;i++){cum+=ss[i].arc;if(norm<cum){idx=i;break}}let sa=wheel.angle-Math.PI/2;for(let i=0;i<idx;i++)sa+=ss[i].arc;ctx.beginPath();ctx.moveTo(wheel.cx,wheel.cy);ctx.arc(wheel.cx,wheel.cy,wheel.radius+3,sa,sa+ss[idx].arc);ctx.closePath();ctx.strokeStyle='rgba(255,48,80,.45)';ctx.lineWidth=3;ctx.stroke()}
  requestAnimationFrame(loop);
}

// ========================================================= INIT =========================================================
(function init(){
  const db=document.getElementById('dotsBg');for(let i=0;i<20;i++){const d=document.createElement('div');d.className='dot';d.style.left=Math.random()*100+'%';d.style.width=d.style.height=(1.5+Math.random()*3)+'px';d.style.animationDuration=(10+Math.random()*20)+'s';d.style.animationDelay=Math.random()*20+'s';d.style.background=Math.random()<.5?'var(--glow)':'var(--gold)';db.appendChild(d)}
  document.querySelectorAll('.btm-tabs .bt').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.t)));
  refreshAll();
  window.addEventListener('resize',()=>{if(!rd())return;if(wheel){wheel=buildWheel(rd().items);initParticles();wheel.draw()}refreshSidebar();refreshRight()});
  requestAnimationFrame(loop);
})();
</script>
