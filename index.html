<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>咒术转盘 · JJK Roulette</title>
<style>
:root {
  --bg: #060608;
  --bg2: #12121a;
  --red: #c41e3a;
  --red-glow: #ff3050;
  --purple: #6b21a8;
  --gold: #c9a84c;
  --text: #e0d8d0;
  --dim: #6b6560;
  --radius: 14px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* —— 背景氛围 —— */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(196,30,58,.12) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(107,33,168,.08) 0%, transparent 55%);
}
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    repeating-linear-gradient(0deg, rgba(255,255,255,.006) 0px, rgba(255,255,255,.006) 1px, transparent 1px, transparent 3px),
    repeating-linear-gradient(90deg, rgba(255,255,255,.003) 0px, rgba(255,255,255,.003) 1px, transparent 1px, transparent 6px);
  mask-image: radial-gradient(ellipse 70% 70% at 50% 40%, black 30%, transparent 70%);
}

/* 飘落咒力粒子 */
.particles-bg { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.particle-bg {
  position:absolute; width:3px; height:3px; border-radius:50%;
  background:var(--red-glow); opacity:0;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0% { transform:translateY(105vh) scale(0); opacity:0; }
  10% { opacity:0.6; }
  90% { opacity:0.2; }
  100% { transform:translateY(-10vh) scale(1.5); opacity:0; }
}

/* —— 主容器 —— */
.app { position:relative; z-index:1; max-width:700px; margin:0 auto; padding:12px 16px 24px; display:flex; flex-direction:column; align-items:center; gap:12px; min-height:100vh; }

/* —— 标题 —— */
.header { text-align:center; padding-top:6px; }
.header .jp { font-size:13px; color:var(--gold); letter-spacing:5px; font-family:serif; margin-bottom:2px; }
.header h1 {
  font-size:clamp(26px,6vw,42px); font-weight:900; letter-spacing:6px;
  background:linear-gradient(180deg, #ff5070 0%, var(--red) 40%, #801028 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 12px rgba(255,48,80,.4));
  line-height:1.2;
}
.header .divider { width:80px; height:2px; margin:6px auto; background:linear-gradient(90deg, transparent, var(--gold), transparent); }
.header .sub { font-size:11px; color:var(--dim); letter-spacing:4px; }

/* —— 进度指示器 —— */
.progress { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
.progress .dot {
  width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12); transition:all .4s;
}
.progress .dot.done { background:var(--red); border-color:var(--red); box-shadow:0 0 8px rgba(255,48,80,.6); }
.progress .dot.current { background:rgba(255,48,80,.5); border-color:var(--red-glow); animation:dotPulse 1.2s ease infinite; }
@keyframes dotPulse { 0%,100%{box-shadow:0 0 4px rgba(255,48,80,.3)} 50%{box-shadow:0 0 14px rgba(255,48,80,.8)} }

/* —— 分类标签 —— */
.tabs { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; width:100%; max-width:600px; }
.tab {
  padding:10px 6px; border-radius:10px; border:1px solid rgba(255,255,255,.1);
  background:var(--bg2); color:var(--dim); cursor:pointer; font-size:12px;
  text-align:center; transition:all .3s; position:relative; letter-spacing:1px;
}
.tab:hover { border-color:rgba(255,255,255,.3); color:var(--text); }
.tab.active { background:linear-gradient(135deg, #2d0f18, #1a0f20); border-color:var(--red); color:#fff; box-shadow:0 0 16px rgba(196,30,58,.25); }
.tab.done { opacity:.45; border-color:rgba(107,101,96,.2); background:transparent; }
.tab.done::after { content:' ✓'; color:var(--gold); font-size:10px; }

/* —— 轮盘区域 —— */
.wheel-area { position:relative; width:100%; display:flex; flex-direction:column; align-items:center; }
.wheel-wrap { position:relative; width:min(82vw,400px); aspect-ratio:1; margin:4px 0; }
.wheel-wrap canvas { width:100%; height:100%; display:block; filter:drop-shadow(0 0 30px rgba(196,30,58,.2)); }

/* 指针 */
.pointer {
  position:absolute; top:-10px; left:50%; transform:translateX(-50%); z-index:10;
  width:0; height:0;
  border-left:18px solid transparent; border-right:18px solid transparent;
  border-top:34px solid var(--red-glow);
  filter:drop-shadow(0 0 10px var(--red-glow));
  transition:filter .3s;
}
.pointer::before {
  content:''; position:absolute; top:-36px; left:-4px;
  width:8px; height:16px; background:var(--red-glow); border-radius:4px; box-shadow:0 0 10px var(--red-glow);
}
.pointer.spinning { filter:drop-shadow(0 0 22px var(--red-glow)) brightness(1.4); animation:ptrVibrate .08s linear infinite; }
@keyframes ptrVibrate { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(2px)} }

/* 中心按钮叠层 */
.center-btn {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5;
  width:22%; aspect-ratio:1; border-radius:50%;
  background:radial-gradient(circle, #1e1e2e 0%, #0a0a0c 100%);
  border:2px solid rgba(201,168,76,.5); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-family:serif; font-size:clamp(14px,4vw,22px); color:var(--gold);
  box-shadow:0 0 20px rgba(0,0,0,.5), inset 0 0 10px rgba(0,0,0,.3);
  transition:all .25s;
}
.center-btn:hover { border-color:var(--gold); box-shadow:0 0 30px rgba(201,168,76,.3), inset 0 0 16px rgba(0,0,0,.4); }
.center-btn:active { transform:translate(-50%,-50%) scale(.92); }

/* —— 按钮 —— */
.btn-row { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; align-items:center; }
.btn {
  padding:12px 30px; border-radius:28px; border:none; cursor:pointer;
  font-size:15px; font-weight:700; letter-spacing:2px; transition:all .3s;
}
.btn-spin {
  background:linear-gradient(135deg, #e0304a, #901030); color:#fff;
  box-shadow:0 0 0 rgba(224,48,74,0);
  animation:btnGlow 2s ease infinite;
  position:relative;
}
.btn-spin::after {
  content:''; position:absolute; inset:-3px; border-radius:30px; border:2px solid transparent;
  animation:btnRing 2s ease infinite; pointer-events:none;
}
@keyframes btnGlow { 0%,100%{box-shadow:0 4px 24px rgba(224,48,74,.35)} 50%{box-shadow:0 6px 34px rgba(255,48,80,.55)} }
@keyframes btnRing { 0%,100%{border-color:rgba(255,48,80,0);transform:scale(1)} 50%{border-color:rgba(255,48,80,.3);transform:scale(1.04)} 100%{border-color:rgba(255,48,80,0);transform:scale(1)} }
.btn-spin:disabled { opacity:.5; cursor:not-allowed; animation:none; }
.btn-spin:disabled::after { animation:none; border-color:transparent; }
.btn-spin:active:not(:disabled) { transform:scale(.94); }

.btn-bgm { background:var(--bg2); color:var(--text); border:1px solid rgba(255,255,255,.12); font-size:12px; padding:10px 16px; letter-spacing:1px; }
.btn-bgm.on { border-color:var(--gold); color:var(--gold); }
.btn-reset { background:transparent; color:var(--dim); border:1px solid rgba(255,255,255,.08); font-size:11px; padding:8px 14px; }

/* —— 结果面板 —— */
.result-panel {
  width:100%; max-width:600px; background:var(--bg2); border-radius:var(--radius);
  border-left:4px solid var(--red); padding:18px 20px; text-align:center;
  animation:resultIn .5s cubic-bezier(.16,1,.3,1); position:relative; overflow:hidden;
}
.result-panel::before {
  content:''; position:absolute; top:-30px; right:-30px; width:120px; height:120px; border-radius:50%;
  background:radial-gradient(circle, rgba(196,30,58,.1) 0%, transparent 70%); pointer-events:none;
}
.result-panel .cat { font-size:11px; color:var(--dim); letter-spacing:3px; text-transform:uppercase; }
.result-panel .value { font-size:clamp(20px,5vw,30px); font-weight:900; margin:4px 0 6px; letter-spacing:2px; }
.result-panel .desc { font-size:13px; color:var(--dim); font-style:italic; line-height:1.7; max-width:500px; margin:0 auto; }
@keyframes resultIn { from{opacity:0;transform:translateY(20px) scale(.94)} to{opacity:1;transform:translateY(0) scale(1)} }

/* —— 历史 —— */
.history { width:100%; max-width:600px; }
.history h3 { font-size:12px; color:var(--dim); letter-spacing:3px; margin-bottom:8px; }
.history-list { display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; }
.history-list::-webkit-scrollbar { height:2px; }
.history-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.08); border-radius:2px; }
.history-item {
  flex-shrink:0; background:var(--bg2); border:1px solid rgba(255,255,255,.06); border-radius:10px;
  padding:8px 14px; display:flex; align-items:center; gap:8px; scroll-snap-align:start;
  animation:popIn .35s cubic-bezier(.16,1,.3,1); border-left-width:3px;
}
.history-item .hi-dot { width:8px; height:8px; border-radius:3px; flex-shrink:0; }
.history-item .hi-label { font-size:10px; color:var(--dim); }
.history-item .hi-value { font-size:13px; color:var(--text); font-weight:600; }
@keyframes popIn { from{opacity:0;transform:scale(.8)} to{opacity:1;transform:scale(1)} }

/* 角色卡按钮 */
.char-card-btn {
  display:none; margin-top:8px; padding:12px 28px; border-radius:28px;
  background:linear-gradient(135deg, var(--gold), #8a7030); color:#1a1a1a;
  font-weight:800; font-size:15px; letter-spacing:3px; border:none; cursor:pointer;
  box-shadow:0 4px 20px rgba(201,168,76,.3); transition:all .3s;
}
.char-card-btn.show { display:block; }
.char-card-btn:hover { box-shadow:0 6px 30px rgba(201,168,76,.5); transform:translateY(-2px); }

/* BGM 指示器 */
.bgm-indicator { position:fixed; bottom:16px; right:16px; font-size:10px; color:var(--dim); z-index:5; display:flex; align-items:center; gap:6px; }
.bgm-indicator .dot { width:5px; height:5px; border-radius:50%; background:var(--gold); animation:pulse 2s ease infinite; display:none; }
.bgm-indicator.on .dot { display:block; }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

/* 响应式 */
@media (max-width:480px) {
  .app { padding:8px 10px 20px; gap:10px; }
  .tabs { grid-template-columns:repeat(4,1fr); gap:5px; }
  .tab { padding:8px 2px; font-size:11px; letter-spacing:0; border-radius:8px; }
  .wheel-wrap { width:85vw; }
  .btn { padding:10px 22px; font-size:13px; letter-spacing:1px; }
  .btn-bgm { padding:8px 12px; font-size:10px; }
  .center-btn { width:18%; }
  .pointer { border-top-width:26px; border-left-width:14px; border-right-width:14px; }
  .header h1 { letter-spacing:3px; }
}
</style>
</head>
<body>

<!-- 飘落粒子背景 -->

<div class="bgm-indicator off" id="bgmIndicator"><span class="dot"></span>BGM</div>

// ==================== 音频引擎 ====================
class AudioEngine {
  constructor() { this.ctx = null; this.bgmOn = false; this.bgmNodes = []; this.initialized = false; }
  init() { if(this.initialized) return; try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();this.initialized=true;}catch(e){} }
  startBgm() {
    if(!this.ctx||this.bgmOn)return;this.bgmOn=true;const c=this.ctx;
    const mg=c.createGain();mg.gain.value=.08;mg.connect(c.destination);this.bgmNodes.push(mg);
    const o1=c.createOscillator();o1.type='sawtooth';o1.frequency.value=55;const g1=c.createGain();g1.gain.value=.12;
    const f1=c.createBiquadFilter();f1.type='lowpass';f1.frequency.value=180;o1.connect(f1).connect(g1).connect(mg);o1.start();
    const o2=c.createOscillator();o2.type='sine';o2.frequency.value=110;const g2=c.createGain();g2.gain.value=.06;
    const l2=c.createOscillator();l2.frequency.value=.15;l2.type='sine';const lg2=c.createGain();lg2.gain.value=12;
    l2.connect(lg2).connect(o2.frequency);l2.start();o2.connect(g2).connect(mg);o2.start();
    const o3=c.createOscillator();o3.type='triangle';o3.frequency.value=880;const g3=c.createGain();g3.gain.value=.02;
    const l3=c.createOscillator();l3.frequency.value=.22;l3.type='sawtooth';const lg3=c.createGain();lg3.gain.value=60;
    l3.connect(lg3).connect(o3.frequency);l3.start();o3.connect(g3).connect(mg);o3.start();
    this.bgmNodes.push(o1,o2,o3,l2,l3);
  }
  stopBgm() { this.bgmOn=false;for(let n of this.bgmNodes)try{n.stop()}catch(e){};this.bgmNodes=[]; }
  playTick() {
    if(!this.ctx)return;const c=this.ctx;
    const o=c.createOscillator();o.type='square';o.frequency.value=700+Math.random()*500;
    const g=c.createGain();g.gain.setValueAtTime(.025,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.03);
    o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+.04);
  }
  playResult() {
    if(!this.ctx)return;const c=this.ctx;const n=c.currentTime;
    const o1=c.createOscillator();o1.type='sine';o1.frequency.setValueAtTime(100,n);o1.frequency.exponentialRampToValueAtTime(35,n+.45);
    const g1=c.createGain();g1.gain.setValueAtTime(.18,n);g1.gain.exponentialRampToValueAtTime(.001,n+.55);
    o1.connect(g1).connect(c.destination);o1.start(n);o1.stop(n+.55);
    const o2=c.createOscillator();o2.type='triangle';o2.frequency.setValueAtTime(550,n);o2.frequency.exponentialRampToValueAtTime(180,n+.35);
    const g2=c.createGain();g2.gain.setValueAtTime(.07,n);g2.gain.exponentialRampToValueAtTime(.001,n+.4);
    o2.connect(g2).connect(c.destination);o2.start(n);o2.stop(n+.4);
  }
  playClick() {
    if(!this.ctx)return;const c=this.ctx;
    const o=c.createOscillator();o.type='sine';o.frequency.value=600;
    const g=c.createGain();g.gain.setValueAtTime(.05,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.07);
    o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+.08);
  }
}

// ==================== 粒子系统 ====================
class Particle {
  constructor(x,y,color,size,vx,vy,life){this.x=x;this.y=y;this.color=color;this.size=size;this.vx=vx;this.vy=vy;this.life=life;this.maxLife=life;this.alpha=1;}
  update(dt){this.x+=this.vx*dt;this.y+=this.vy*dt;this.vy+=30*dt;this.life-=dt;this.alpha=Math.max(0,this.life/this.maxLife);this.size*=.997;}
  draw(ctx){ctx.save();ctx.globalAlpha=this.alpha;ctx.fillStyle=this.color;ctx.shadowBlur=this.size*4;ctx.shadowColor=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();ctx.restore();}
  get dead(){return this.life<=0;}
}
class ParticleSystem {
  constructor(){this.particles=[];}
  emit(x,y,count,color,spread,size,life){for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2;const s=Math.random()*spread;this.particles.push(new Particle(x,y,color,size*(.5+Math.random()),Math.cos(a)*s,Math.sin(a)*s-50,life*(.6+Math.random()*.4)));}}
  update(dt){for(let p of this.particles)p.update(dt);this.particles=this.particles.filter(p=>!p.dead);}
  draw(ctx){for(let p of this.particles)p.draw(ctx);}
  clear(){this.particles=[];}
}

// ==================== 转盘渲染 ====================
class WheelRenderer {
  constructor(canvas,items){
    this.canvas=canvas;this.ctx=canvas.getContext('2d');this.items=items;this.angle=0;this.n=items.length;this.resize();
  }
  resize(){
    const wrap=this.canvas.parentElement;const size=wrap.clientWidth;
    const dpr=Math.min(window.devicePixelRatio||1,2);
    this.canvas.width=size*dpr;this.canvas.height=size*dpr;
    this.canvas.style.width=size+'px';this.canvas.style.height=size+'px';
    this.size=size;this.cx=size/2;this.cy=size/2;this.radius=size/2-18;this.dpr=dpr;this.draw();
  }
  draw(){
    const ctx=this.ctx,dpr=this.dpr;ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,this.size,this.size);
    const n=this.n,arc=Math.PI*2/n,cx=this.cx,cy=this.cy,r=this.radius;

    // 外圈装饰：金色刻度环
    for(let i=0;i<48;i++){
      const a=(i/48)*Math.PI*2-Math.PI/2,rr=r+10;
      ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*(rr-3),cy+Math.sin(a)*(rr-3));
      ctx.lineTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr);
      ctx.strokeStyle=i%3===0?'rgba(201,168,76,.7)':'rgba(201,168,76,.2)';
      ctx.lineWidth=i%3===0?1.5:.6;ctx.stroke();
    }

    // 外圈发光环
    ctx.beginPath();ctx.arc(cx,cy,r+12,0,Math.PI*2);ctx.strokeStyle='rgba(196,30,58,.2)';ctx.lineWidth=4;ctx.shadowBlur=20;ctx.shadowColor='rgba(196,30,58,.4)';ctx.stroke();ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(cx,cy,r+2,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1.5;ctx.stroke();

    // 扇区
    for(let i=0;i<n;i++){
      const sa=this.angle+i*arc-Math.PI/2,ea=sa+arc;
      // 径向渐变扇区
      const grad=ctx.createRadialGradient(cx,cy,r*.2,cx,cy,r);
      const baseColor=this.items[i].color||'#333';
      grad.addColorStop(0,baseColor);
      grad.addColorStop(.6,baseColor);
      grad.addColorStop(1,this._darken(baseColor,.4));
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,sa,ea);ctx.closePath();
      ctx.fillStyle=grad;ctx.fill();
      // 金线分隔
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,sa,ea);ctx.lineTo(cx,cy);
      ctx.strokeStyle='rgba(201,168,76,.35)';ctx.lineWidth=.7;ctx.stroke();
      // 文字 + 发光
      ctx.save();ctx.translate(cx,cy);ctx.rotate(sa+arc/2);
      ctx.textAlign='right';const fs=Math.max(10,r*.095);
      ctx.font=`bold ${fs}px "PingFang SC","Microsoft YaHei",sans-serif`;
      ctx.fillStyle='#fff';ctx.shadowColor='rgba(255,255,255,.5)';ctx.shadowBlur=4;
      ctx.fillText(this.items[i].label,r-10,fs*.35);
      ctx.shadowBlur=0;ctx.restore();
    }
  }
  _darken(hex,amount){
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgb(${Math.floor(r*(1-amount))},${Math.floor(g*(1-amount))},${Math.floor(b*(1-amount))})`;
  }
}

// ==================== 主应用 ====================
class App {
  constructor(){
    this.state={category:'identity',results:[],spinning:false,targetAngle:0,spinStartAngle:0,spinStartTime:0,spinDuration:0,lastAngle:0};
    this.audio=new AudioEngine();this.particles=new ParticleSystem();this.wheel=null;
    this.initDOM();this.initWheel();this.addListeners();
    this.lastFrameTime=performance.now();requestAnimationFrame(t=>this.loop(t));
  }

  initDOM(){
    this.tabs=document.getElementById('tabs');this.progress=document.getElementById('progress');
    this.btnSpin=document.getElementById('btnSpin');this.btnBgm=document.getElementById('btnBgm');
    this.btnReset=document.getElementById('btnReset');this.resultPanel=document.getElementById('resultPanel');
    this.historyList=document.getElementById('historyList');this.pointer=document.getElementById('pointer');
    this.charCardBtn=document.getElementById('charCardBtn');this.bgmIndicator=document.getElementById('bgmIndicator');
    this.centerBtn=document.getElementById('centerBtn');

    // 标签
    CAT_KEYS.forEach(k=>{
      const tab=document.createElement('button');tab.className='tab';tab.textContent=CATEGORIES[k].icon+' '+CATEGORIES[k].name;
      tab.dataset.key=k;tab.addEventListener('click',()=>this.switchCategory(k));this.tabs.appendChild(tab);
    });
    // 进度
    CAT_KEYS.forEach(()=>{const d=document.createElement('div');d.className='dot';this.progress.appendChild(d);});

    this.btnSpin.addEventListener('click',()=>this.spin());
    this.btnBgm.addEventListener('click',()=>{this.audio.init();this.audio.bgmOn?this.stopBgm():this.startBgm();});
    this.btnReset.addEventListener('click',()=>this.reset());
    this.centerBtn.addEventListener('click',()=>{if(!this.state.spinning)this.spin();});
  }

  initWheel(){
    const canvas=document.getElementById('wheelCanvas');
    this.wheel=new WheelRenderer(canvas,CATEGORIES[this.state.category].items);
    this.btnSpin.disabled=false;this.updateUI();window.addEventListener('resize',()=>this.wheel.resize());
  }

  switchCategory(key){
    if(this.state.spinning)return;this.audio.init();this.audio.playClick();
    this.state.category=key;this.wheel.items=CATEGORIES[key].items;this.wheel.n=this.wheel.items.length;
    this.wheel.angle=0;this.state.targetAngle=0;this.wheel.draw();
    this.resultPanel.style.display='none';this.updateUI();
  }

  updateUI(){
    // 标签状态
    [...this.tabs.children].forEach(t=>{
      const k=t.dataset.key;t.classList.remove('active','done');
      if(k===this.state.category)t.classList.add('active');
    });
    // 进度点
    const cats=this.state.results.map(r=>{for(let k of CAT_KEYS)if(CATEGORIES[k].name===r.category)return k;return null;});
    [...this.progress.children].forEach((d,i)=>{
      d.classList.remove('done','current');if(cats.includes(CAT_KEYS[i]))d.classList.add('done');
    });
    if(!this.state.spinning){
      const idx=CAT_KEYS.indexOf(this.state.category);
      if(!cats.includes(this.state.category))this.progress.children[idx]?.classList.add('current');
    }
    // 已完成标签打勾
    [...this.tabs.children].forEach(t=>{if(cats.includes(t.dataset.key)&&t.dataset.key!==this.state.category)t.classList.add('done');});

    // 角色卡按钮
    this.charCardBtn.classList.toggle('show',cats.filter((c,i,a)=>a.indexOf(c)===i).length>=8);
  }

  spin(){
    if(this.state.spinning)return;this.audio.init();this.audio.playClick();
    this.state.spinning=true;this.btnSpin.disabled=true;this.btnSpin.textContent='⏳ 旋转中…';
    this.resultPanel.style.display='none';this.particles.clear();
    this.pointer.classList.add('spinning');

    // 随机目标，持续3-5秒
    const n=this.wheel.n,arc=Math.PI*2/n;
    const targetIndex=Math.floor(Math.random()*n);
    const jitter=(Math.random()-.5)*arc*.6;
    const fullSpins=(6+Math.floor(Math.random()*4))*Math.PI*2;
    this.state.targetAngle=this.wheel.angle+fullSpins+targetIndex*arc+arc/2+jitter;
    this.state.spinStartAngle=this.wheel.angle;
    this.state.spinStartTime=performance.now();
    this.state.spinDuration=3000+Math.random()*2000; // 3-5秒
  }

  stop(){
    this.state.spinning=false;this.btnSpin.disabled=false;this.btnSpin.textContent='🌀 开 始 旋 转';
    this.pointer.classList.remove('spinning');

    const n=this.wheel.n,arc=Math.PI*2/n;
    let raw=(this.wheel.angle-Math.PI/2)%(Math.PI*2);if(raw<0)raw+=Math.PI*2;
    const adjusted=(-raw+Math.PI*2)%(Math.PI*2);
    const index=Math.floor(adjusted/arc)%n;
    const item=this.wheel.items[index];

    this.showResult(item);
    this.state.results.push({category:CATEGORIES[this.state.category].name,...item});
    this.updateHistory();this.updateUI();

    // 粒子爆发
    this.particles.emit(this.wheel.cx,18,70,'#ff3050',200,4.5,1.8);
    this.particles.emit(this.wheel.cx,18,35,'#ffcc00',160,3.5,1.4);
    this.particles.emit(this.wheel.cx,18,25,'#ffffff',120,2.5,1);

    this.audio.playResult();
  }

  showResult(item){
    this.resultPanel.style.display='block';
    const c=item.color||'#333';
    this.resultPanel.style.borderLeftColor=c;
    this.resultPanel.style.boxShadow=`0 0 30px ${c}20`;
    this.resultPanel.innerHTML=`
      <div class="cat">${CATEGORIES[this.state.category].icon} ${CATEGORIES[this.state.category].name}</div>
      <div class="value" style="color:${c};text-shadow:0 0 18px ${c}88">${item.label}</div>
      <div class="desc">${item.desc}</div>
    `;
  }

  updateHistory(){
    this.historyList.innerHTML=this.state.results.map(r=>{
      const c=r.color||'#333';const key=CAT_KEYS.find(k=>CATEGORIES[k].name===r.category);
      return `<div class="history-item" style="border-left-color:${c}"><span class="hi-dot" style="background:${c}"></span><span class="hi-label">${r.category}:</span><span class="hi-value">${r.label}</span></div>`;
    }).join('');
  }

  reset(){this.audio.init();this.audio.playClick();this.state.results=[];this.historyList.innerHTML='';this.resultPanel.style.display='none';this.particles.clear();this.charCardBtn.classList.remove('show');this.updateUI();}

  startBgm(){this.audio.startBgm();this.btnBgm.textContent='🔊 BGM';this.btnBgm.classList.add('on');this.btnBgm.classList.remove('off');this.bgmIndicator.classList.add('on');this.bgmIndicator.classList.remove('off');}
  stopBgm(){this.audio.stopBgm();this.btnBgm.textContent='🔇 BGM';this.btnBgm.classList.remove('on');this.btnBgm.classList.add('off');this.bgmIndicator.classList.remove('on');this.bgmIndicator.classList.add('off');}

  addListeners(){
    document.addEventListener('keydown',e=>{if(e.code==='Space'&&!this.state.spinning){e.preventDefault();this.spin();}});
  }

  loop(timestamp){
    const dt=Math.min((timestamp-this.lastFrameTime)/1000,.1);this.lastFrameTime=timestamp;

    if(this.state.spinning){
      const elapsed=timestamp-this.state.spinStartTime;
      const dur=this.state.spinDuration;
      const progress=Math.min(elapsed/dur,1);
      // easeOutCubic: 1-(1-t)^3
      const eased=1-Math.pow(1-progress,3);
      this.wheel.angle=this.state.spinStartAngle+(this.state.targetAngle-this.state.spinStartAngle)*eased;

      // tick音效
      if(progress<.95){
        const speed=Math.abs(this.wheel.angle-this.state.lastAngle);
        if(speed>.03&&Math.random()<.4)this.audio.playTick();
        this.state.lastAngle=this.wheel.angle;
      }
      // 边缘粒子
      if(Math.random()<.35){
        const ex=this.wheel.cx+Math.cos(this.wheel.angle)*this.wheel.radius;
        const ey=this.wheel.cy+Math.sin(this.wheel.angle)*this.wheel.radius;
        this.particles.emit(ex,ey,1,'#ff305080',25,1.2,.35);
      }

      if(progress>=1){this.wheel.angle=this.state.targetAngle;this.wheel.draw();this.stop();}
    }

    this.particles.update(dt);
    this.wheel.draw();
    // 静止时高亮指针扇区
    if(!this.state.spinning){
      const ctx=this.wheel.ctx,dpr=this.wheel.dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
      const n=this.wheel.n,arc=Math.PI*2/n;
      let raw=(this.wheel.angle-Math.PI/2)%(Math.PI*2);if(raw<0)raw+=Math.PI*2;
      const adj=(-raw+Math.PI*2)%(Math.PI*2);const idx=Math.floor(adj/arc)%n;
      const sa=this.wheel.angle+idx*arc-Math.PI/2;
      ctx.beginPath();ctx.moveTo(this.wheel.cx,this.wheel.cy);
      ctx.arc(this.wheel.cx,this.wheel.cy,this.wheel.radius+4,sa,sa+arc);ctx.closePath();
      ctx.strokeStyle='rgba(255,48,80,.5)';ctx.lineWidth=3;ctx.stroke();
    }
    this.particles.draw(this.wheel.ctx);
    requestAnimationFrame(t=>this.loop(t));
  }
}

const app = new App();
</script>
