<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>咒术转盘 · JJK</title>
<style>
:root{--bg:#060608;--bg2:#12121a;--bg3:#1a1a24;--red:#c41e3a;--red-glow:#ff3050;--purple:#6b21a8;--gold:#c9a84c;--text:#e0d8d0;--dim:#6b6560;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;user-select:none}

/* ─── 层1: 红紫光晕 ─── */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(196,30,58,.10) 0%,transparent 50%),radial-gradient(ellipse 60% 40% at 50% 100%,rgba(107,33,168,.06) 0%,transparent 50%)}
/* ─── 层2: 螺旋咒纹 ─── */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:repeating-conic-gradient(from 0deg,rgba(255,48,80,.015) 0% .5%,transparent .5% 3%);mask-image:radial-gradient(ellipse 60% 60% at 50% 40%,black 20%,transparent 70%);animation:sealSpin 120s linear infinite}
@keyframes sealSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ─── 层3: 角落咒字 ─── */
.corner-seal{position:fixed;pointer-events:none;z-index:0;font-family:serif;opacity:.05;animation:cornerFloat 20s ease-in-out infinite}
.corner-seal.tl{top:5%;left:5%;font-size:clamp(60px,10vw,120px);color:var(--red-glow)}
.corner-seal.tr{top:5%;right:5%;font-size:clamp(50px,8vw,100px);color:var(--gold);animation-delay:-7s}
.corner-seal.bl{bottom:5%;left:5%;font-size:clamp(70px,12vw,140px);color:var(--gold);animation-delay:-14s}
.corner-seal.br{bottom:5%;right:5%;font-size:clamp(55px,9vw,110px);color:var(--red-glow);animation-delay:-3s}
@keyframes cornerFloat{0%,100%{transform:translateY(0) rotate(0deg)}33%{transform:translateY(-15px) rotate(3deg)}66%{transform:translateY(10px) rotate(-2deg)}}

/* ─── 飘落粒子 ─── */
.bg-particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-p{position:absolute;border-radius:50%;background:var(--red-glow);opacity:0;animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(105vh) scale(0);opacity:0}10%{opacity:.35}90%{opacity:.08}100%{transform:translateY(-10vh) scale(1.5);opacity:0}}

/* ─── 主容器 ─── */
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;padding-bottom:70px}
@media(min-width:768px){.app{display:grid;grid-template-columns:200px 1fr 260px;min-height:100vh;padding:0}}

/* ─── 顶部栏(移动端) ─── */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;gap:8px}
.top-bar .phase-label{font-size:11px;color:var(--dim);letter-spacing:1px}
.top-bar .phase-name{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-bar .phase-icon{font-size:18px}
.progress-dots{display:flex;gap:6px;align-items:center;flex-shrink:0}
.progress-dots .pd{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);transition:all .3s;flex-shrink:0}
.progress-dots .pd.done{background:var(--gold);border-color:var(--gold)}
.progress-dots .pd.current{background:var(--red);border-color:var(--red);box-shadow:0 0 10px rgba(255,48,80,.5)}
@media(min-width:768px){.top-bar{display:none}}

/* ─── 左侧栏(桌面) ─── */
.sidebar{display:none;background:var(--bg2);border-right:1px solid rgba(255,255,255,.06);flex-direction:column;padding:20px 14px;gap:16px;overflow-y:auto}
.sidebar .sb-phase{font-size:11px;color:var(--dim);letter-spacing:1px}
.sidebar .sb-title{font-size:13px;font-weight:700;margin-bottom:2px}
.sidebar .sb-divider{height:1px;background:rgba(255,255,255,.06);margin:4px 0}
.steps{display:flex;flex-direction:column;gap:4px}
.step{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:.25s;border:1px solid transparent;font-size:12px}
.step:hover{border-color:rgba(255,255,255,.1)}
.step .step-dot{width:10px;height:10px;border-radius:50%;border:2px solid rgba(255,255,255,.2);flex-shrink:0;transition:.3s}
.step.done .step-dot{background:var(--gold);border-color:var(--gold)}
.step.current{background:rgba(196,30,58,.1);border-color:rgba(196,30,58,.3)}
.step.current .step-dot{background:var(--red);border-color:var(--red);box-shadow:0 0 8px rgba(255,48,80,.4)}
.step.done{opacity:.5}
.step .step-num{font-size:10px;color:var(--dim);width:16px;text-align:center}
.step .step-label{color:var(--dim);font-size:12px}
.step.current .step-label{color:var(--text);font-weight:600}
.down-phases{margin-top:auto}
.down-phases .dp{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:11px;color:var(--dim);opacity:.3}
@media(min-width:768px){.sidebar{display:flex}}

/* ─── 中央区域 ─── */
.center-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:12px 14px;gap:10px;overflow-y:auto}
@media(min-width:768px){.center-area{padding-top:24px}}

.pc-phase-header{display:none;text-align:center}
.pc-phase-header .pph-label{font-size:11px;color:var(--dim);letter-spacing:2px}
.pc-phase-header .pph-name{font-size:18px;font-weight:800;margin-top:2px}
@media(min-width:768px){.pc-phase-header{display:block}}

.round-title{font-size:16px;font-weight:700;text-align:center;letter-spacing:1px}

/* ─── 转盘 ─── */
.wheel-wrap{position:relative;width:min(80vw,380px);aspect-ratio:1;flex-shrink:0}
.wheel-wrap canvas{width:100%;height:100%}
.wheel-wrap .pointer{position:absolute;top:-10px;left:50%;transform:translateX(-50%);z-index:10;width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:30px solid var(--red-glow);filter:drop-shadow(0 0 8px var(--red-glow))}
.wheel-wrap .pointer::before{content:'';position:absolute;top:-32px;left:-4px;width:8px;height:14px;background:var(--red-glow);border-radius:4px;box-shadow:0 0 8px var(--red-glow)}
.wheel-wrap .p-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:8}
.center-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;width:20%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,#1e1e2e 0%,#0a0a0c 100%);border:2px solid rgba(201,168,76,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:serif;font-size:clamp(14px,3.5vw,20px);color:var(--gold);box-shadow:0 0 20px rgba(0,0,0,.5),inset 0 0 10px rgba(0,0,0,.3);transition:.25s}
.center-dot:hover{border-color:var(--gold);box-shadow:0 0 30px rgba(201,168,76,.3)}

/* ─── 旋转按钮 ─── */
.btn-spin{width:100%;max-width:340px;padding:13px;border-radius:28px;border:none;cursor:pointer;font-size:16px;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,#e0304a,#901030);color:#fff;box-shadow:0 4px 22px rgba(224,48,74,.35);transition:.3s;animation:btnGlow 2s ease infinite}
.btn-spin:disabled{opacity:.45;cursor:not-allowed;animation:none}
.btn-next{display:none;width:100%;max-width:340px;padding:11px;border-radius:28px;border:1px solid var(--gold);cursor:pointer;font-size:14px;font-weight:700;letter-spacing:1px;background:transparent;color:var(--gold);transition:.3s}
.btn-next:hover{border-color:#fff;color:#fff}
.btn-next.show{display:block}
@keyframes btnGlow{0%,100%{box-shadow:0 4px 22px rgba(224,48,74,.35)}50%{box-shadow:0 6px 34px rgba(255,48,80,.55)}}

/* ─── 结果面板 ─── */
.result-panel{width:100%;max-width:500px;background:var(--bg2);border-radius:var(--r);padding:14px 18px;text-align:center;animation:fadeIn .35s ease;display:none}
.result-panel .rp-cat{font-size:11px;color:var(--dim);letter-spacing:2px}
.result-panel .rp-value{font-size:clamp(18px,4vw,24px);font-weight:800;margin:4px 0 6px;letter-spacing:1px}
.result-panel .rp-desc{font-size:13px;color:rgba(224,216,208,.7);line-height:1.6;margin-top:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ─── 右侧面板(桌面) ─── */
.right-panel{display:none;background:var(--bg2);border-left:1px solid rgba(255,255,255,.06);flex-direction:column;overflow-y:auto}
@media(min-width:768px){.right-panel{display:flex}}
.rp-section{border-bottom:1px solid rgba(255,255,255,.04)}
.rp-section-header{display:flex;align-items:center;gap:8px;padding:14px 14px 8px;font-size:12px;font-weight:700;letter-spacing:1px;color:var(--dim)}
.rp-person{padding:8px 14px 14px;display:flex;flex-direction:column;gap:6px}
.rp-person .pp-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 8px;border-radius:6px;background:rgba(255,255,255,.02)}
.rp-person .pp-key{color:var(--dim)}
.rp-person .pp-val{color:var(--text);font-weight:600}
.rp-history{padding:8px 14px 14px;display:flex;flex-direction:column;gap:6px;max-height:45vh;overflow-y:auto}
.rp-history .h-item{display:flex;gap:8px;align-items:flex-start;font-size:11px;padding:6px 8px;border-radius:6px;background:rgba(255,255,255,.02);border-left:3px solid transparent}
.rp-history .h-item .h-dot{width:6px;height:6px;border-radius:3px;margin-top:4px;flex-shrink:0}
.rp-history .h-item .h-label{color:var(--dim);flex-shrink:0}
.rp-history .h-item .h-val{color:var(--text);font-weight:600}

/* ─── Tab 视图(移动端) ─── */
.tab-view{display:none;flex:1;overflow-y:auto;padding:14px}
.tab-view.active{display:block}
@media(min-width:768px){.tab-view{display:none!important}}

.tab-person-card{background:var(--bg2);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:8px}
.tab-person-card .tpc-title{font-size:11px;color:var(--dim);letter-spacing:2px;margin-bottom:4px}
.tab-person-card .tpc-row{display:flex;justify-content:space-between;padding:5px 8px;border-radius:6px;background:rgba(255,255,255,.015);font-size:13px}
.tab-person-card .tpc-key{color:var(--dim)}
.tab-person-card .tpc-val{font-weight:600}
.tab-history-list{display:flex;flex-direction:column;gap:8px}
.tab-history-list .th-item{display:flex;gap:10px;align-items:flex-start;font-size:13px;padding:10px 12px;border-radius:10px;background:var(--bg2);border-left:3px solid transparent}
.tab-history-list .th-dot{width:8px;height:8px;border-radius:3px;margin-top:3px;flex-shrink:0}
.tab-history-list .th-body{display:flex;flex-direction:column;gap:2px}
.tab-history-list .th-label{color:var(--dim);font-size:10px;letter-spacing:1px}
.tab-history-list .th-val{font-weight:600}
.tab-history-list .th-desc{color:rgba(224,216,208,.7);font-size:12px;line-height:1.5;margin-top:3px}
.tab-empty{text-align:center;padding:40px 20px;color:var(--dim);font-size:13px}

/* ─── 底部 Tab 栏(移动端) ─── */
.bottom-tabs{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;background:var(--bg2);border-top:1px solid rgba(255,255,255,.08);padding:4px 0 env(safe-area-inset-bottom,4px) 0}
.bottom-tabs .bt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 0;cursor:pointer;color:var(--dim);font-size:11px;gap:3px;transition:.25s;position:relative}
.bottom-tabs .bt.active{color:#fff}
.bottom-tabs .bt .bt-icon{font-size:20px}
.bottom-tabs .bt .bt-badge{position:absolute;top:2px;left:calc(50% + 12px);min-width:16px;height:16px;border-radius:8px;background:var(--red);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
@media(min-width:768px){.bottom-tabs{display:none}}

/* ─── Toast ─── */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:60;background:var(--bg2);border:1px solid rgba(255,255,255,.1);padding:10px 20px;border-radius:20px;font-size:13px;color:var(--text);animation:toastIn .4s ease,toastOut .3s ease 1.8s forwards;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
</style>
</head>
<body>

<div class="bg-particles" id="bgParticles"></div>
<div class="corner-seal tl">呪</div>
<div class="corner-seal tr">術</div>
<div class="corner-seal bl">封</div>
<div class="corner-seal br">解</div>

<div class="app" id="app">
  <!-- 移动端顶部栏 -->
  <div class="top-bar" id="topBar">
    <div style="display:flex;align-items:center;gap:8px;overflow:hidden">
      <span class="phase-icon" id="topPhaseIcon"></span>
      <div style="overflow:hidden">
        <div class="phase-label" id="topPhaseLabel"></div>
        <div class="phase-name" id="topPhaseName"></div>
      </div>
    </div>
    <div class="progress-dots" id="topProgress"></div>
  </div>

  <!-- 桌面左侧栏 -->
  <div class="sidebar" id="sidebar"></div>

  <!-- 中央区域 -->
  <div class="center-area" id="centerArea">
    <div class="pc-phase-header" id="pcPhaseHeader"></div>
    <div class="round-title" id="roundTitle"></div>
    <div class="wheel-wrap" id="wheelWrap">
      <div class="pointer" id="pointer"></div>
      <canvas id="wheelCanvas"></canvas>
      <canvas class="p-canvas" id="pCanvas"></canvas>
      <div class="center-dot" id="centerDot">呪</div>
    </div>
    <button class="btn-spin" id="btnSpin">🌀 点击旋转</button>
    <button class="btn-next" id="btnNext">→ 下一轮</button>
    <div class="result-panel" id="resultPanel"></div>
  </div>

  <!-- 桌面右侧面板 -->
  <div class="right-panel" id="rightPanel">
    <div class="rp-section">
      <div class="rp-section-header">👤 当前人物</div>
      <div class="rp-person" id="rpPerson"></div>
    </div>
    <div class="rp-section">
      <div class="rp-section-header">📋 事件历史</div>
      <div class="rp-history" id="rpHistory"></div>
    </div>
  </div>

  <!-- 移动端 Tab 视图 -->
  <div class="tab-view active" id="tabWheel"></div>
  <div class="tab-view" id="tabPerson"></div>
  <div class="tab-view" id="tabHistory"></div>
</div>

<!-- 移动端底部 Tab -->
<div class="bottom-tabs" id="bottomTabs">
  <div class="bt active" data-tab="wheel"><span class="bt-icon">🎯</span><span>转盘</span><span class="bt-badge" id="btBadgeWheel"></span></div>
  <div class="bt" data-tab="person"><span class="bt-icon">👤</span><span>人物</span><span class="bt-badge" id="btBadgePerson"></span></div>
  <div class="bt" data-tab="history"><span class="bt-icon">📋</span><span>历史</span><span class="bt-badge" id="btBadgeHistory"></span></div>
</div>
<div id="toastContainer"></div>

<script>
// ============================== EMBEDDED DATA ==============================
const EMBEDDED_DATA={
  "title":"咒术转盘 · JJK Roulette","subtitle_jp":"呪 術 廻 戦","subtitle_en":"JUJUTSU KAISEN · ROULETTE",
  "phases":[
    {"id":"phase1","name":"身份奠基","icon":"🧬","rounds":[
      {"id":"identity","title":"穿越后的身份","icon":"🎭","desc":"决定你在咒术世界的出身立场","propertyKey":"身份","items":[
        {"label":"普通人","weight":4,"desc":"无咒力的凡人，在咒术的世界中挣扎求生，却拥有最不可测的潜力。","color":"#1a1a20"},
        {"label":"咒术高层","weight":1,"desc":"咒术界权力核心的一员。生于御三家或咒术世家，手握规则与资源。","color":"#201830"},
        {"label":"咒灵","weight":1,"desc":"人类负面情绪中诞生的诅咒。以恐惧为食，以毁灭为本能。","color":"#301020"},
        {"label":"式神","weight":1,"desc":"被术师召唤并役使的灵体。你的存在与召唤者共生共存。","color":"#0a2020"},
        {"label":"咒骸","weight":1,"desc":"以咒力为核心驱动的人造物。非生非死，超越常理的造物。","color":"#1a1a2a"},
        {"label":"咒术师","weight":1,"desc":"掌握咒力、行使术式的正统术师。高专毕业，以拔除咒灵为业。","color":"#102040"},
        {"label":"诅咒师","weight":1,"desc":"叛离咒术界的术师。为私欲与力量不择手段，被咒术界追捕。","color":"#300a0a"}]},
      {"id":"timeline","title":"穿越的时间线","icon":"⏳","desc":"你降临于哪个时代？时代决定世界观基调和可用咒术体系","propertyKey":"时代","items":[
        {"label":"未知时间","weight":1,"desc":"模糊混沌的时间点。你无法确定自己身在何处——这既是诅咒，也是自由。","color":"#1a1a1a"},
        {"label":"平安京","weight":1,"desc":"千年前的诅咒全盛期。宿傩横行的时代，咒术还是方术的雏形。","color":"#2a1a10"},
        {"label":"战国乱世","weight":1,"desc":"群雄割据的黑暗时代。咒术与兵戈交织，生死一线间。","color":"#1a2a10"},
        {"label":"现代","weight":1,"desc":"咒术高专的黄金时代。五条悟诞生，咒术界的平衡被彻底改写。","color":"#102030"},
        {"label":"68年后","weight":1,"desc":"时光流转68年。故人已去，新的秩序在废墟中重建。","color":"#0a1a1a"},
        {"label":"千年前","weight":1,"desc":"比平安京更久远的时代。咒术尚未成型，诅咒以最原始的形式存在。","color":"#1a1018"},
        {"label":"咒术全盛期","weight":1,"desc":"术式百花齐放的时代。强者辈出，领域与极之番被逐一开发。","color":"#201820"},
        {"label":"末法时代","weight":1,"desc":"咒力从世界消退。术师凋零，诅咒却愈发猖獗——最后的天选之人。","color":"#181818"}]},
      {"id":"location","title":"穿越的地点","icon":"📍","desc":"你降落在咒术世界的哪个角落？","propertyKey":"地点","items":[
        {"label":"咒术高专","weight":1,"desc":"东京都立咒术高专——教育年轻术师的学府，也是最安全的庇护所。","color":"#102040"},
        {"label":"咒术高专(京都)","weight":1,"desc":"京都咒术高专——传统派的大本营，比东京更为严苛。","color":"#201030"},
        {"label":"诅咒之地","weight":1,"desc":"被诅咒侵蚀的废土。咒灵横行，但也是磨练实力的最佳战场。","color":"#301010"},
        {"label":"御三家宅邸","weight":1,"desc":"五条、禅院或加茂家的深处。权力与阴谋交织的核心。","color":"#2a1a2a"},
        {"label":"诅咒之胎","weight":1,"desc":"咒灵的巢穴深处。你诞生于诅咒的核心，生来就与死亡为伴。","color":"#201010"},
        {"label":"人间都市","weight":1,"desc":"普通的城市街区。结界保护着凡人，但暗处藏着不为人知的恐怖。","color":"#1a1a2a"},
        {"label":"封印之地","weight":1,"desc":"古老术式封印的遗迹。被遗忘的力量在此沉睡，等待被唤醒。","color":"#10101a"},
        {"label":"异界裂缝","weight":1,"desc":"现实与诅咒世界的交界处。法则紊乱，一切皆有可能。","color":"#1a101a"}]},
      {"id":"stats","title":"穿越的数据值","icon":"📊","desc":"你的初始评价等级。受身份影响——强大的出身带来更高的起点","propertyKey":"评级","items":[
        {"label":"SSS 传说级","weight":1,"desc":"咒术界的传说。天生拥有超越一切常理的天赋与咒力。","color":"#ffcc00"},
        {"label":"SS 顶级","weight":2,"desc":"万里挑一的逸才。在咒术史的任何一个时代都能留下名字。","color":"#e8a020"},
        {"label":"S 超一级","weight":2,"desc":"远超同级的天赋。距离传说的境界只有一步之遥。","color":"#d08030"},
        {"label":"A 一级","weight":3,"desc":"优秀的咒术师。足以拔除大多数咒灵，在战场上独当一面。","color":"#8840a0"},
        {"label":"B 准一级","weight":2,"desc":"合格的术师。在正确的训练下可以成长为可靠的战力。","color":"#4060b0"},
        {"label":"C 见习级","weight":1,"desc":"初出茅庐的新人。潜力未开发，前路漫长但并非毫无希望。","color":"#408060"}]},
      {"id":"moral","title":"道德水平","icon":"⚖️","desc":"你的善恶立场。道德影响事件走向、同伴关系与最终归属","propertyKey":"道德","items":[
        {"label":"1·混沌恶","weight":1,"desc":"毫无逻辑的恶意。以毁灭与痛苦为乐，诅咒的化身。","color":"#4a1020"},
        {"label":"2·中立恶","weight":1,"desc":"为个人利益不择手段。没有善恶，只有得失。","color":"#6a2020"},
        {"label":"3·秩序恶","weight":1,"desc":"以规则为武器压迫弱者。冷静而残忍的暴君。","color":"#8a2030"},
        {"label":"4·混沌中立","weight":1,"desc":"随心所欲的浪人。善恶全凭心情，不受任何约束。","color":"#886848"},
        {"label":"5·绝对中立","weight":1,"desc":"不偏不倚的旁观者。命运如何流转，我只做自己的选择。","color":"#686868"},
        {"label":"6·秩序中立","weight":1,"desc":"规则即正义。善恶不是标准，秩序才是。","color":"#8090a0"},
        {"label":"7·混沌善","weight":1,"desc":"我行我素的侠客。不拘泥于规则，但底线从不丢失。","color":"#a08c20"},
        {"label":"8·中立善","weight":1,"desc":"在力所能及处行善。不是圣人，但心有善念。","color":"#c4a830"},
        {"label":"9·秩序善","weight":1,"desc":"以拯救苍生为己任。即使牺牲自己也在所不惜。","color":"#e8d44d"}]}
    ]},
    {"id":"phase2","name":"能力构筑","icon":"🔮","rounds":[]},
    {"id":"phase3","name":"成长事件","icon":"⚡","rounds":[]},
    {"id":"phase4","name":"战斗模拟","icon":"⚔️","rounds":[]},
    {"id":"phase5","name":"结局判定","icon":"⌛","rounds":[]}
  ]
};
let DATA=EMBEDDED_DATA;
try{fetch('data.json').then(r=>r.json()).then(d=>{DATA=d;App.refreshAll()}).catch(()=>{})}catch(e){}

let currentPhaseIdx=0,currentRoundIdx=0;
const App={particles:null,wheel:null,state:{spinning:false,targetAngle:0,spinStartAngle:0,spinStartTime:0,spinDuration:0,lastAngle:0,results:[],currentTab:'wheel'},

init(){const bg=document.getElementById('bgParticles');for(let i=0;i<20;i++){const p=document.createElement('div');p.className='bg-p';p.style.left=Math.random()*100+'%';p.style.width=p.style.height=(1.5+Math.random()*3)+'px';p.style.animationDuration=(10+Math.random()*20)+'s';p.style.animationDelay=Math.random()*20+'s';p.style.background=Math.random()<.5?'var(--red-glow)':'var(--gold)';bg.appendChild(p)}
this.wheelCanvas=document.getElementById('wheelCanvas');this.pCanvas=document.getElementById('pCanvas');this.btnNext=document.getElementById('btnNext');
this.particles=new ParticleSystem(this.pCanvas);this.refreshAll();this.bindEvents();this.resized();
window.addEventListener('resize',()=>this.resized());requestAnimationFrame(t=>this.loop(t));},

get phase(){return DATA.phases[currentPhaseIdx]},
get round(){return this.phase.rounds[currentRoundIdx]},
get results(){return this.state.results},
get isRoundDone(){return this.results.some(r=>r.roundId===this.round.id)},

resized(){const s=this.wheelCanvas.parentElement.clientWidth,dpr=Math.min(window.devicePixelRatio||1,2);this.pCanvas.width=s*dpr;this.pCanvas.height=s*dpr;this.pCanvas.style.width=s+'px';this.pCanvas.style.height=s+'px';this.particles.ctx.setTransform(dpr,0,0,dpr,0,0);if(this.wheel)this.wheel.resize()},

refreshAll(){this.renderPhase();this.renderRound();this.renderSidebar();this.renderRightPanel();this.renderTabs();this.updateBadges();},

renderPhase(){document.getElementById('topPhaseIcon').textContent=this.phase.icon;document.getElementById('topPhaseLabel').textContent='阶段'+(currentPhaseIdx+1);document.getElementById('topPhaseName').textContent=this.phase.name;
document.getElementById('pcPhaseHeader').innerHTML=`<div class="pph-label">阶段${currentPhaseIdx+1}</div><div class="pph-name">${this.phase.icon} ${this.phase.name}</div>`;
const dots=document.getElementById('topProgress');dots.innerHTML='';this.phase.rounds.forEach((r,i)=>{const d=document.createElement('span');d.className='pd';if(this.results.some(rr=>rr.roundId===r.id))d.classList.add('done');if(i===currentRoundIdx&&!this.isRoundDone)d.classList.add('current');dots.appendChild(d)});
// Next button visibility
const allDone=this.phase.rounds.every(r=>this.results.some(rr=>rr.roundId===r.id));
if(this.isRoundDone&&!allDone)this.btnNext.classList.add('show');else this.btnNext.classList.remove('show')},

renderRound(){const r=this.round;document.getElementById('roundTitle').innerHTML=`<span class="rt-icon">${r.icon}</span> 第${currentRoundIdx+1}转：${r.title}`;
this.wheel=new WheelRenderer(this.wheelCanvas,r.items);this.wheel.buildOffscreen();this.wheel.angle=0;this.state.targetAngle=0;this.wheel.draw();this.resized();document.getElementById('resultPanel').style.display='none';document.getElementById('btnSpin').disabled=this.isRoundDone;document.getElementById('btnSpin').textContent=this.isRoundDone?'✅ 已抽取':'🌀 点击旋转';
this.btnNext.classList.remove('show')},

renderSidebar(){if(window.innerWidth<768)return;const sb=document.getElementById('sidebar');const ph=this.phase;
let h=`<div class="sb-phase">阶段${currentPhaseIdx+1}</div><div class="sb-title">${ph.icon} ${ph.name}</div><div class="sb-divider"></div><div class="steps">`;
ph.rounds.forEach((r,i)=>{const done=this.results.some(rr=>rr.roundId===r.id);const cur=i===currentRoundIdx&&!done;
h+=`<div class="step ${done?'done':''} ${cur?'current':''}" data-round="${i}" onclick="App.goRound(${i})"><span class="step-dot"></span><span class="step-num">${done?'✓':(i+1)}</span><span class="step-label">${r.title}</span></div>`});
h+='</div><div class="down-phases">';DATA.phases.forEach((p,i)=>{if(i>currentPhaseIdx)h+=`<div class="dp">🔒 阶段${i+1} ${p.name}</div>`});h+='</div>';sb.innerHTML=h},

renderRightPanel(){if(window.innerWidth<768)return;
const person=document.getElementById('rpPerson');const keys=this.phase.rounds.map(r=>r.propertyKey).filter(Boolean);const vals={};this.results.forEach(r=>{if(r.propertyKey)vals[r.propertyKey]=r.label});
if(keys.length===0)person.innerHTML='<div style="font-size:11px;color:var(--dim);padding:8px">暂无数据</div>';
else person.innerHTML=keys.map(k=>`<div class="pp-row"><span class="pp-key">${k}</span><span class="pp-val">${vals[k]||'——'}</span></div>`).join('');
const hist=document.getElementById('rpHistory');
if(this.results.length===0)hist.innerHTML='<div style="font-size:11px;color:var(--dim);padding:8px">尚未抽取</div>';
else hist.innerHTML=this.results.map(r=>`<div class="h-item" style="border-left-color:${r.color||'#333'}"><span class="h-dot" style="background:${r.color||'#333'}"></span><span class="h-label">${r.roundTitle}:</span><span class="h-val">${r.label}</span></div>`).join('')},

renderTabs(){const keys=this.phase.rounds.map(r=>r.propertyKey).filter(Boolean);const vals={};this.results.forEach(r=>{if(r.propertyKey)vals[r.propertyKey]=r.label});
const tp=document.getElementById('tabPerson');
if(keys.length===0)tp.innerHTML='<div class="tab-empty">暂无人物数据</div>';
else{let h=`<div class="tab-person-card"><div class="tpc-title">👤 当前人物状态</div>`;keys.forEach(k=>{h+=`<div class="tpc-row"><span class="tpc-key">${k}</span><span class="tpc-val">${vals[k]||'——'}</span></div>`});h+='</div>';tp.innerHTML=h}
const th=document.getElementById('tabHistory');
if(this.results.length===0)th.innerHTML='<div class="tab-empty">暂无事件记录<br>回到转盘开始抽取吧</div>';
else{let h='<div class="tab-history-list">';this.results.forEach(r=>{h+=`<div class="th-item" style="border-left-color:${r.color||'#333'}"><span class="th-dot" style="background:${r.color||'#333'}"></span><div class="th-body"><span class="th-label">${r.roundTitle}</span><span class="th-val">${r.label}</span><span class="th-desc">${r.desc||''}</span></div></div>`});h+='</div>';th.innerHTML=h}},

bindEvents(){document.getElementById('btnSpin').addEventListener('click',()=>this.spin());
document.getElementById('centerDot').addEventListener('click',()=>{if(!this.state.spinning&&!this.isRoundDone)this.spin()});
document.getElementById('wheelCanvas').addEventListener('click',()=>{if(!this.state.spinning&&!this.isRoundDone)this.spin()});
document.getElementById('btnNext').addEventListener('click',()=>this.goNext());
document.addEventListener('keydown',e=>{if(e.code==='Space'&&!this.state.spinning&&!this.isRoundDone){e.preventDefault();this.spin()}});
document.querySelectorAll('.bottom-tabs .bt').forEach(bt=>{bt.addEventListener('click',()=>this.setTab(bt.dataset.tab))})},

setTab(tab){this.state.currentTab=tab;document.querySelectorAll('.bottom-tabs .bt').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));
const view=document.getElementById(tab==='wheel'?'tabWheel':tab==='person'?'tabPerson':'tabHistory');
if(view)view.classList.add('active');this.updateBadges()},

updateBadges(){const bh=document.getElementById('btBadgeHistory');bh.style.display=this.results.length>0&&this.state.currentTab!=='history'?'flex':'none';if(bh.style.display!=='none')bh.textContent=this.results.length;
const bp=document.getElementById('btBadgePerson');const keys=this.phase.rounds.map(r=>r.propertyKey).filter(Boolean);const filled=keys.filter(k=>this.results.some(r=>r.propertyKey===k)).length;bp.style.display=filled>0&&this.state.currentTab!=='person'?'flex':'none';if(bp.style.display!=='none')bp.textContent=filled},

goRound(idx){if(this.state.spinning)return;if(this.results.some(r=>r.roundId===this.phase.rounds[idx].id)){showToast('该轮已抽取，无法重复');return}
currentRoundIdx=idx;this.refreshAll();this.wheel.angle=0;this.state.targetAngle=0;this.wheel.draw();document.getElementById('resultPanel').style.display='none';this.btnNext.classList.remove('show')},

goNext(){const allDone=this.phase.rounds.every(r=>this.results.some(rr=>rr.roundId===r.id));if(allDone)return;
for(let i=0;i<this.phase.rounds.length;i++){if(!this.results.some(rr=>rr.roundId===this.phase.rounds[i].id)){currentRoundIdx=i;break}}
this.refreshAll();this.wheel.angle=0;this.state.targetAngle=0;this.wheel.draw();document.getElementById('resultPanel').style.display='none';this.btnNext.classList.remove('show')},

spin(){if(this.state.spinning||this.isRoundDone)return;this.state.spinning=true;
document.getElementById('btnSpin').disabled=true;document.getElementById('btnSpin').textContent='⏳ 旋转中…';document.getElementById('resultPanel').style.display='none';this.btnNext.classList.remove('show');this.particles.clear();
const sectors=this.wheel.sectors,totalW=sectors.reduce((s,se)=>s+(se.weight||1),0);let r=Math.random()*totalW,targetIdx=0;
for(let i=0;i<sectors.length;i++){r-=sectors[i].weight||1;if(r<=0){targetIdx=i;break}}
const arc=sectors[targetIdx].arc,jitter=(Math.random()-.5)*arc*.7;let cumArc=0;for(let i=0;i<targetIdx;i++)cumArc+=sectors[i].arc;
const fullSpins=(6+Math.floor(Math.random()*4))*Math.PI*2;
this.state.targetAngle=this.wheel.angle+fullSpins-cumArc-arc/2+jitter;this.state.spinStartAngle=this.wheel.angle;this.state.spinStartTime=performance.now();this.state.spinDuration=3000+Math.random()*2000;},

stop(){this.state.spinning=false;document.getElementById('btnSpin').disabled=false;document.getElementById('btnSpin').textContent='✅ 已抽取';
const sectors=this.wheel.sectors;let norm=(-this.wheel.angle)%(Math.PI*2);if(norm<0)norm+=Math.PI*2;let cum=0,idx=0;
for(let i=0;i<sectors.length;i++){cum+=sectors[i].arc;if(norm<cum){idx=i;break}}
const item=sectors[idx];const result={roundId:this.round.id,roundTitle:`${this.round.icon} ${this.round.title}`,propertyKey:this.round.propertyKey,label:item.label,desc:item.desc||'',color:item.color||'#333'};
this.state.results.push(result);
const panel=document.getElementById('resultPanel');panel.style.display='block';panel.style.borderLeft=`4px solid ${item.color||'#333'}`;
panel.innerHTML=`<div class="rp-cat">${this.round.icon} ${this.round.title}</div><div class="rp-value" style="color:${item.color||'#333'};text-shadow:0 0 14px ${item.color||'#333'}88">${item.label}</div><div class="rp-desc">${item.desc||''}</div>`;
this.particles.emit(this.wheel.cx,20,60,item.color||'#ff3050',200,4,2);this.particles.emit(this.wheel.cx,20,30,'#ffcc00',140,3,1.4);this.particles.emit(this.wheel.cx,20,20,'#fff',100,2.5,1);
this.refreshAll();},

lastFrameTime:performance.now(),
loop(timestamp){const dt=Math.min((timestamp-this.lastFrameTime)/1000,.1);this.lastFrameTime=timestamp;
if(this.state.spinning){const elapsed=timestamp-this.state.spinStartTime,dur=this.state.spinDuration,progress=Math.min(elapsed/dur,1),eased=1-Math.pow(1-progress,3);
this.wheel.angle=this.state.spinStartAngle+(this.state.targetAngle-this.state.spinStartAngle)*eased;
if(Math.random()<.05){const ex=this.wheel.cx+Math.cos(this.wheel.angle)*this.wheel.radius;const ey=this.wheel.cy+Math.sin(this.wheel.angle)*this.wheel.radius;this.particles.emit(ex,ey,1,'#ff305060',18,.8,.3)}
if(progress>=1){this.wheel.angle=this.state.targetAngle;this.wheel.draw();this.stop()}}
this.particles.update(dt);this.wheel.draw();
if(!this.state.spinning){const ctx=this.wheel.ctx,d=this.wheel.dpr;ctx.setTransform(d,0,0,d,0,0);const sectors=this.wheel.sectors;let norm=(-this.wheel.angle)%(Math.PI*2);if(norm<0)norm+=Math.PI*2;let cum=0,idx=0;for(let i=0;i<sectors.length;i++){cum+=sectors[i].arc;if(norm<cum){idx=i;break}}let sa=this.wheel.angle-Math.PI/2;for(let i=0;i<idx;i++)sa+=sectors[i].arc;ctx.beginPath();ctx.moveTo(this.wheel.cx,this.wheel.cy);ctx.arc(this.wheel.cx,this.wheel.cy,this.wheel.r+3,sa,sa+sectors[idx].arc);ctx.closePath();ctx.strokeStyle='rgba(255,48,80,.45)';ctx.lineWidth=3;ctx.stroke()}
const ps=this.wheel.s;this.particles.ctx.setTransform(this.wheel.dpr,0,0,this.wheel.dpr,0,0);this.particles.ctx.clearRect(0,0,ps,ps);
for(let p of this.particles.particles){const ctx=this.particles.ctx;ctx.save();ctx.globalAlpha=p.a;ctx.fillStyle=p.c;ctx.shadowBlur=p.s*4;ctx.shadowColor=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,Math.PI*2);ctx.fill();ctx.restore()}
requestAnimationFrame(t=>this.loop(t))}
};

// ============================== PARTICLES ==============================
class Particle{constructor(x,y,c,s,vx,vy,l){this.x=x;this.y=y;this.c=c;this.s=s;this.vx=vx;this.vy=vy;this.l=l;this.ml=l;this.a=1}update(dt){this.x+=this.vx*dt;this.y+=this.vy*dt;this.vy+=25*dt;this.l-=dt;this.a=Math.max(0,this.l/this.ml);this.s*=.997}get dead(){return this.l<=0}}
class ParticleSystem{constructor(canvas){this.canvas=canvas;this.ctx=canvas.getContext('2d');this.particles=[]}
emit(x,y,n,c,sp,sz,l){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*sp;this.particles.push(new Particle(x,y,c,sz*(.5+Math.random()),Math.cos(a)*s,Math.sin(a)*s-40,l*(.6+Math.random()*.4)))}}
update(dt){for(let p of this.particles)p.update(dt);this.particles=this.particles.filter(p=>!p.dead)}
clear(){this.particles=[]}}

// ============================== WHEEL RENDERER (offscreen pre-render) ==============================
class WheelRenderer{constructor(canvas,items){this.canvas=canvas;this.ctx=canvas.getContext('2d');this.items=items;this.angle=0;this.radius=0;this.buildSectors();this.resize()}
buildSectors(){const totalW=this.items.reduce((s,i)=>s+(i.weight||1),0);this.sectors=this.items.map(i=>({...i,arc:(i.weight||1)/totalW*Math.PI*2}))}
resize(){const w=this.canvas.parentElement.clientWidth,dpr=Math.min(window.devicePixelRatio||1,2);this.canvas.width=w*dpr;this.canvas.height=w*dpr;this.canvas.style.width=w+'px';this.canvas.style.height=w+'px';this.s=w;this.cx=w/2;this.cy=w/2;this.r=w/2-18;this.dpr=dpr;
// offscreen canvas
this.offs=new OffscreenCanvas?new OffscreenCanvas(this.canvas.width,this.canvas.height):document.createElement('canvas');
this.offs.width=this.canvas.width;this.offs.height=this.canvas.height;this.offsCtx=this.offs.getContext('2d');this.offsCtx.setTransform(dpr,0,0,dpr,0,0);this.prerender();this.draw()}
prerender(){const ctx=this.offsCtx,cx=this.cx,cy=this.cy,r=this.r;ctx.clearRect(0,0,this.s,this.s);
// 外圈发光
ctx.beginPath();ctx.arc(cx,cy,r+10,0,Math.PI*2);ctx.strokeStyle='rgba(196,30,58,.18)';ctx.lineWidth=3;ctx.shadowBlur=12;ctx.shadowColor='rgba(196,30,58,.3)';ctx.stroke();ctx.shadowBlur=0;
// 刻度
for(let i=0;i<48;i++){const aa=i/48*Math.PI*2-Math.PI/2;ctx.beginPath();ctx.moveTo(cx+Math.cos(aa)*(r+6),cy+Math.sin(aa)*(r+6));ctx.lineTo(cx+Math.cos(aa)*(r+11),cy+Math.sin(aa)*(r+11));ctx.strokeStyle=i%3===0?'rgba(201,168,76,.5)':'rgba(201,168,76,.15)';ctx.lineWidth=i%3===0?1.2:.5;ctx.stroke()}
// 扇区
let a=-Math.PI/2;
for(let s of this.sectors){const sa=a,ea=a+s.arc;const grad=ctx.createRadialGradient(cx,cy,r*.15,cx,cy,r);grad.addColorStop(0,s.color||'#333');grad.addColorStop(.6,s.color||'#333');grad.addColorStop(1,this._dark(s.color,.4));ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,sa,ea);ctx.closePath();ctx.fillStyle=grad;ctx.fill();ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,sa,ea);ctx.lineTo(cx,cy);ctx.strokeStyle='rgba(201,168,76,.3)';ctx.lineWidth=.6;ctx.stroke();
ctx.save();ctx.translate(cx,cy);ctx.rotate(sa+s.arc/2);const fs=Math.max(9,r*.09);ctx.font=`bold ${fs}px "PingFang SC","Microsoft YaHei",sans-serif`;ctx.textAlign='right';ctx.fillStyle='#fff';ctx.shadowColor='rgba(255,255,255,.4)';ctx.shadowBlur=3;ctx.fillText(s.label,r-10,fs*.35);ctx.shadowBlur=0;ctx.restore();a=ea}
// 中心
const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,r*.16);grad.addColorStop(0,'#1a1a2e');grad.addColorStop(.7,'#0a0a0c');grad.addColorStop(1,'rgba(0,0,0,.8)');ctx.beginPath();ctx.arc(cx,cy,r*.14,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();ctx.strokeStyle='rgba(201,168,76,.5)';ctx.lineWidth=1.2;ctx.stroke()}
buildOffscreen(){this.prerender()}
draw(){const ctx=this.ctx,d=this.dpr;ctx.setTransform(d,0,0,d,0,0);ctx.clearRect(0,0,this.s,this.s);
// 旋转绘制预渲染的离屏位图
ctx.save();ctx.translate(this.cx,this.cy);ctx.rotate(this.angle);ctx.drawImage(this.offs,-this.cx,-this.cy);ctx.restore()}
_dark(h,amt){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `rgb(${Math.floor(r*(1-amt))},${Math.floor(g*(1-amt))},${Math.floor(b*(1-amt))})`}}

// ============================== TOAST ==============================
function showToast(msg){const c=document.getElementById('toastContainer');const d=document.createElement('div');d.className='toast';d.textContent=msg;c.appendChild(d);setTimeout(()=>d.remove(),2200)}

// ============================== START ==============================
App.init();
</script>
